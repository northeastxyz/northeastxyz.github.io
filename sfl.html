<body>

    <!-- 🔔 IKLAN 1: SOCIAL BAR (Selalu Aktif) -->

    <div class="container">
        <h3>Menyiapkan Tautan...</h3>
        <p>Mohon tunggu sebentar untuk melanjutkan ke tujuan Anda.</p>
        
        <div id="loading-zone">
            <div class="loader"></div>
            <div class="timer" id="countdown">Menunggu: 3 detik</div>
        </div>
        
        <a href="#" id="redirect-btn" class="btn">KLIK DI SINI UNTUK MELANJUTKAN</a>
    </div>

    <!-- 🌐 IKLAN 2: POPUNDER JINAK (Hanya Trigger 1 Kali via Cookie) -->
    <script>
        function setCookie(name, value, hours) {
            const d = new Date();
            d.setTime(d.getTime() + (hours * 60 * 60 * 1000));
            const expires = "expires=" + d.toUTCString();
            document.cookie = name + "=" + value + ";" + expires + ";path=/";
        }

        function getCookie(name) {
            const cname = name + "=";
            const decodedCookie = decodeURIComponent(document.cookie);
            const ca = decodedCookie.split(';');
            for(let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') {
                    c = c.substring(1);
                }
                if (c.indexOf(cname) == 0) {
                    return c.substring(cname.length, c.length);
                }
            }
            return "";
        }

        // Jalankan popunder hanya jika cookie belum diset
        if (getCookie("popunder_fired") === "") {
            // Pasang tanda bahwa user sudah pernah terkena popunder
            // Angka 2 artinya iklan tidak akan muncul lagi selama 2 jam ke depan untuk user yang sama
            setCookie("popunder_fired", "true", 2); 

            // Masukkan script Popunder AdSterra Anda di sini secara dinamis
            const popScript = document.createElement('script');
            popScript.src = "https://pl30358751.effectivecpmnetwork.com/2c/e9/c0/2ce9c079ee14af4f602429741861788e.js";
            document.body.appendChild(popScript);
        }
    </script>

    <!-- KODE PENGALIH LINK -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const encodedUrl = urlParams.get('to'); 
        let targetUrl = null;

        if (encodedUrl) {
            try {
                targetUrl = atob(encodedUrl);
            } catch (e) {
                targetUrl = null;
            }
        }

        if (!targetUrl) {
            document.getElementById('loading-zone').innerHTML = "<p style='color:red; font-weight:bold;'>Error: Tautan tujuan tidak valid.</p>";
        } else {
            let timeLeft = 3; 
            const timerElement = document.getElementById('countdown');
            const btnElement = document.getElementById('redirect-btn');
            const loadingZone = document.getElementById('loading-zone');

            const downloadTimer = setInterval(function(){
                timeLeft--;
                timerElement.innerText = "Menunggu: " + timeLeft + " detik";
                
                if(timeLeft <= 0){
                    clearInterval(downloadTimer);
                    loadingZone.style.display = "none";
                    btnElement.href = targetUrl;
                    btnElement.setAttribute('rel', 'noreferrer noopener');
                    btnElement.style.display = "inline-block";
                }
            }, 1000);
        }
    </script>

</body>
