<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohon Tunggu Sebentar...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-sizing: border-box;
        }
        .text {
            font-size: 16px;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.5;
            font-weight: 500;
        }
        .btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(40, 167, 69, 0.2);
            transition: background 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #218838;
        }
    </style>

    <!-- SKRIP POPUNDER ADSTERRA ANDA -->
    <script src="https://pl30358751.effectivecpmnetwork.com/2c/e9/c0/2ce9c079ee14af4f602429741861788e.js"></script>
    
</head>
<body>

    <div class="container">
        <p class="text">Mohon tunggu sebentar untuk melanjutkan<br>ke tujuan Anda.</p>
        
        <!-- Tombol navigasi utama -->
        <button class="btn" onclick="redirectToTarget()">KLIK DI SINI UNTUK MELANJUTKAN</button>
    </div>

    <script>
        // Fungsi untuk membaca parameter '?to=' di URL dan mengarahkan penonton
        function redirectToTarget() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetUrl = urlParams.get('to');
            
            if (targetUrl) {
                window.location.href = decodeURIComponent(targetUrl);
            } else {
                alert('Tautan tujuan tidak ditemukan. Pastikan parameter URL sudah benar.');
            }
        }
    </script>

</body>
</html>
