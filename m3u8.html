<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1,
        maximum-scale=1,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>Universal Player</title>

<!-- PLYR -->
<link
    rel="stylesheet"
    href="https://cdn.plyr.io/3.7.8/plyr.css"
/>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
}

.wrapper{
    width:100%;
    height:100%;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

</style>
</head>

<body>

<div class="wrapper">

    <video
        id="player"
        playsinline
        controls
        autoplay
    ></video>

</div>

<script>

// =========================
// GET URL
// =========================

function getStreamUrl(){

    const params =
        new URLSearchParams(
            location.search
        );

    return params.get('url');
}

const streamUrl =
    getStreamUrl();

const video =
    document.getElementById(
        'player'
    );

// =========================
// LOAD STREAM
// =========================

if(streamUrl){

    // native playback
    video.src = streamUrl;

    video.load();

    // autoplay
    video.play()
    .catch(() => {});

}

// =========================
// INIT PLYR
// =========================

const player = new Plyr(
    '#player',
    {

        controls: [

            'play-large',

            'play',

            'progress',

            'current-time',

            'mute',

            'volume',

            'settings',

            'pip',

            'airplay',

            'fullscreen'

        ],

        fullscreen: {
            iosNative: true
        }

    }
);

</script>

</body>
</html>
