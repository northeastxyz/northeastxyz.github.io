<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>JWPlayer Browser Player</title>

<!-- GANTI DENGAN LIBRARY JWPLAYER KAMU -->
<script src="https://cdn.jwplayer.com/libraries/AbCdEf12.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
    font-family:sans-serif;
}

#player{
    width:100%;
    height:100%;
}

.loader{

    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:black;

    z-index:9999;
}

.spinner{

    width:45px;
    height:45px;

    border-radius:50%;

    border:3px solid rgba(255,255,255,.15);
    border-top-color:white;

    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.hidden{
    display:none;
}

.info{

    position:fixed;

    left:10px;
    bottom:10px;

    z-index:99999;

    background:rgba(0,0,0,.45);

    padding:6px 10px;

    border-radius:999px;

    color:white;

    font-size:12px;

    backdrop-filter:blur(5px);
}

</style>
</head>

<body>

<div id="player"></div>

<div class="loader" id="loader">
    <div class="spinner"></div>
</div>

<div class="info" id="status">
    READY
</div>

<script>

// ===============================
// GET STREAM URL
// ===============================

function getRawUrl(){

    const href = window.location.href;

    const index = href.indexOf('?url=');

    if(index === -1){
        return null;
    }

    return decodeURIComponent(
        href.substring(index + 5)
    );
}

const streamUrl = getRawUrl();

const loader =
    document.getElementById('loader');

const statusText =
    document.getElementById('status');

// ===============================
// UI
// ===============================

function showLoader(){
    loader.classList.remove('hidden');
}

function hideLoader(){
    loader.classList.add('hidden');
}

function setStatus(text){
    statusText.innerHTML = text;
}

// ===============================
// CHECK URL
// ===============================

if(!streamUrl){

    setStatus('NO URL');

    document.body.innerHTML = `
        <div style="
            width:100%;
            height:100%;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-size:18px;
        ">
            NO STREAM URL
        </div>
    `;

}
else{

    // ===============================
    // JWPLAYER SETUP
    // ===============================

    const player = jwplayer("player");

    player.setup({

        file: streamUrl,

        type: "hls",

        width: "100%",
        height: "100%",

        autostart: true,

        mute: false,

        controls: true,

        stretching: "uniform",

        primary: "html5",

        playbackRateControls: true,

        repeat: false,

        preload: "auto",

        skin: {
            name: "seven"
        }

    });

    // ===============================
    // EVENTS
    // ===============================

    player.on('ready', () => {

        setStatus('READY');
    });

    player.on('play', () => {

        hideLoader();

        setStatus('PLAYING');
    });

    player.on('buffer', () => {

        showLoader();

        setStatus('BUFFERING');
    });

    player.on('bufferChange', (e) => {

        if(e.bufferPercent >= 100){

            hideLoader();
        }
    });

    player.on('error', (e) => {

        showLoader();

        setStatus('ERROR');

        console.log(e);
    });

    player.on('setupError', (e) => {

        showLoader();

        setStatus('SETUP ERROR');

        console.log(e);
    });

    player.on('complete', () => {

        setStatus('COMPLETE');
    });

}

</script>

</body>
</html>
