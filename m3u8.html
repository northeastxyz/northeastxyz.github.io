<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Native Player</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

</style>
</head>
<body>

<video
    id="video"
    controls
    autoplay
    playsinline
></video>

<script>

function getUrl(){

    const params =
        new URLSearchParams(
            location.search
        );

    return params.get('url');
}

const url = getUrl();

const video =
    document.getElementById('video');

if(url){

    // browser native playback
    video.src = url;

    video.load();

    video.play()
    .catch(console.error);
}

</script>

</body>
</html>
