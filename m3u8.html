<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universal HLS Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

#video{
    width:100vw;
    height:100vh;
    background:#000;
    object-fit:contain;
}

#loading{
    position:absolute;
    color:white;
    font-family:sans-serif;
    font-size:14px;
    z-index:999;
}

#error{
    position:absolute;
    bottom:20px;
    left:20px;
    right:20px;
    color:red;
    font-family:sans-serif;
    font-size:14px;
    z-index:999;
    word-break:break-word;
}

</style>

</head>

<body>

<div id="loading">Loading stream...</div>

<div id="error"></div>

<video
    id="video"
    controls
    autoplay
    muted
    playsinline
></video>

<script>

const video = document.getElementById('video');

const loading = document.getElementById('loading');

const errorBox = document.getElementById('error');

function showError(msg){

    console.error(msg);

    errorBox.innerText = msg;
}

async function init() {

    const params = new URLSearchParams(window.location.search);

    // Support:
    // ?m3u8=
    // ?url=

    const hlsUrl =
        params.get('m3u8') ||
        params.get('url');

    if (!hlsUrl) {

        showError('Missing ?m3u8=');

        return;
    }

    // =========================================
    // FORCE HLS.JS
    // =========================================

    if (Hls.isSupported()) {

        console.log('Using HLS.js');

        const hls = new Hls({

            enableWorker: true,

            lowLatencyMode: true,

            backBufferLength: 90,

            maxBufferLength: 30,

            maxMaxBufferLength: 60,

            liveSyncDurationCount: 3,

            xhrSetup: function(xhr, url) {

                // Kadang membantu bypass anti-leech

                xhr.withCredentials = false;

                xhr.setRequestHeader(
                    'X-Requested-With',
                    'XMLHttpRequest'
                );

            }

        });

        hls.loadSource(hlsUrl);

        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, async function() {

            console.log('Manifest loaded');

            loading.style.display = 'none';

            try {

                await video.play();

            } catch(e) {

                console.error(e);

            }

        });

        hls.on(Hls.Events.LEVEL_LOADED, function() {

            console.log('Level loaded');

        });

        hls.on(Hls.Events.ERROR, function(event, data) {

            console.error('HLS Error:', data);

            showError(
                'HLS Error: ' +
                data.type +
                ' | ' +
                data.details
            );

            // Auto recover

            if (data.fatal) {

                switch(data.type) {

                    case Hls.ErrorTypes.NETWORK_ERROR:

                        console.log('Recover NETWORK_ERROR');

                        hls.startLoad();

                        break;

                    case Hls.ErrorTypes.MEDIA_ERROR:

                        console.log('Recover MEDIA_ERROR');

                        hls.recoverMediaError();

                        break;

                    default:

                        console.log('Destroy HLS');

                        hls.destroy();

                        break;
                }
            }
        });

    } else {

        showError('HLS not supported');

    }

    // =========================================
    // VIDEO EVENTS
    // =========================================

    video.addEventListener('playing', () => {

        loading.style.display = 'none';

    });

    video.addEventListener('waiting', () => {

        loading.style.display = 'block';

    });

    video.addEventListener('click', () => {

        video.play().catch(() => {});

    });

    video.addEventListener('error', (e) => {

        console.error(e);

        showError('Video playback failed');

    });

}

document.addEventListener('DOMContentLoaded', init);

</script>

</body>
</html>
