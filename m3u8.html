<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>Shaka Player Browser</title>

<!-- SHAKA PLAYER -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
    font-family:sans-serif;
}

.player-container{
    position:relative;
    width:100%;
    height:100%;
    background:black;
}

video{
    width:100%;
    height:100%;
    background:black;
    object-fit:contain;
}

/* LOADER */

.loader{

    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.4);

    z-index:9999;
}

.spinner{

    width:45px;
    height:45px;

    border-radius:50%;

    border:3px solid rgba(255,255,255,.15);
    border-top-color:white;

    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.hidden{
    display:none;
}

/* STATUS */

.status{

    position:absolute;

    left:10px;
    bottom:10px;

    z-index:99999;

    background:rgba(0,0,0,.45);

    backdrop-filter:blur(5px);

    border-radius:999px;

    padding:6px 10px;

    color:white;

    font-size:12px;
}

</style>

</head>

<body>

<div class="player-container">

    <video
        id="video"
        autoplay
        playsinline
        controls
    ></video>

    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>

    <div class="status" id="status">
        READY
    </div>

</div>

<script>

// ======================================
// GET STREAM URL
// ======================================

function getRawUrl(){

    const href = window.location.href;

    const index = href.indexOf('?url=');

    if(index === -1){
        return null;
    }

    return decodeURIComponent(
        href.substring(index + 5)
    );
}

const streamUrl = getRawUrl();

const video =
    document.getElementById('video');

const loader =
    document.getElementById('loader');

const statusText =
    document.getElementById('status');

// ======================================
// UI
// ======================================

function showLoader(){
    loader.classList.remove('hidden');
}

function hideLoader(){
    loader.classList.add('hidden');
}

function setStatus(text){
    statusText.innerHTML = text;
}

// ======================================
// SHAKA SUPPORT CHECK
// ======================================

shaka.polyfill.installAll();

if(!shaka.Player.isBrowserSupported()){

    setStatus('UNSUPPORTED');

    throw new Error(
        'Browser not supported!'
    );
}

// ======================================
// PLAYER INIT
// ======================================

async function initPlayer(){

    if(!streamUrl){

        document.body.innerHTML = `
            <div style="
                width:100%;
                height:100%;
                display:flex;
                justify-content:center;
                align-items:center;
                color:white;
                font-size:18px;
            ">
                NO STREAM URL
            </div>
        `;

        return;
    }

    showLoader();

    const player =
        new shaka.Player(video);

    // ======================================
    // CONFIG
    // ======================================

    player.configure({

        streaming: {

            lowLatencyMode: true,

            bufferingGoal: 30,

            rebufferingGoal: 2

        }

    });

    // ======================================
    // ERROR
    // ======================================

    player.addEventListener(
        'error',
        onPlayerError
    );

    try{

        await player.load(streamUrl);

        setStatus('PLAYING');

        hideLoader();

        await video.play();

    }
    catch(error){

        onPlayerError({
            detail:error
        });

    }

    // ======================================
    // VIDEO EVENTS
    // ======================================

    video.addEventListener(
        'waiting',
        () => {

            showLoader();

            setStatus('BUFFERING');

        }
    );

    video.addEventListener(
        'playing',
        () => {

            hideLoader();

            setStatus('LIVE');

        }
    );

    video.addEventListener(
        'error',
        () => {

            setStatus('VIDEO ERROR');

        }
    );

}

// ======================================
// ERROR HANDLER
// ======================================

function onPlayerError(event){

    console.error(event);

    showLoader();

    setStatus('ERROR');

}

// ======================================
// START
// ======================================

window.addEventListener(
    'load',
    initPlayer
);

</script>

</body>
</html>
