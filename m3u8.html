<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1,
        maximum-scale=1,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>Fluid Player</title>

<script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
}

.wrapper{
    width:100%;
    height:100%;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

</style>

</head>
<body>

<div class="wrapper">

<video
    id="videoPlayer"
    controls
    playsinline
    webkit-playsinline
    autoplay
    muted
></video>

</div>

<script>

// =========================
// GET STREAM URL
// =========================

const params =
    new URLSearchParams(
        window.location.search
    );

const streamUrl =
    params.get('url');

const video =
    document.getElementById(
        'videoPlayer'
    );

// =========================
// LOAD VIDEO
// =========================

if(streamUrl){

    // native playback
    video.src = streamUrl;

}

// =========================
// INIT FLUID PLAYER
// =========================

fluidPlayer(
    'videoPlayer',
    {

        layoutControls: {

            fillToContainer: true,

            autoPlay: true,

            mute: false,

            allowDownload: false,

            playbackRateEnabled: true,

            allowTheatre: false,

            controlBar: {
                autoHide: true,
                autoHideTimeout: 3
            },

            fullscreen: true,

            posterImage: ''

        },

        vastOptions: {

            adList: []

        }

    }
);

</script>

</body>
</html>
