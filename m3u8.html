<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>Shaka Player CORS Fix</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
}

.player{
    position:relative;
    width:100%;
    height:100%;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

.loader{

    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.35);

    z-index:999;
}

.spinner{

    width:42px;
    height:42px;

    border-radius:50%;

    border:3px solid rgba(255,255,255,.15);
    border-top-color:white;

    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.hidden{
    display:none;
}

.stats{

    position:absolute;

    left:10px;
    bottom:10px;

    z-index:9999;

    background:rgba(0,0,0,.3);

    backdrop-filter:blur(6px);

    border-radius:999px;

    padding:6px 10px;

    color:white;

    font-size:12px;
}

</style>

</head>

<body>

<div class="player">

    <video
        id="video"
        autoplay
        playsinline
        controls
    ></video>

    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>

    <div class="stats" id="stats">
        READY
    </div>

</div>

<script>

// ===================================
// GET URL
// ===================================

function getRawUrl(){

    const href = window.location.href;

    const index = href.indexOf('?url=');

    if(index === -1){
        return null;
    }

    return decodeURIComponent(
        href.substring(index + 5)
    );
}

const streamUrl = getRawUrl();

const video =
    document.getElementById('video');

const loader =
    document.getElementById('loader');

const stats =
    document.getElementById('stats');

// ===================================
// UI
// ===================================

function showLoader(){
    loader.classList.remove('hidden');
}

function hideLoader(){
    loader.classList.add('hidden');
}

function setStats(text){
    stats.innerHTML = text;
}

// ===================================
// INIT
// ===================================

async function initPlayer(){

    if(!streamUrl){

        setStats('NO URL');

        return;
    }

    showLoader();

    shaka.polyfill.installAll();

    if(!shaka.Player.isBrowserSupported()){

        setStats('UNSUPPORTED');

        return;
    }

    const player =
        new shaka.Player(video);

    // ===================================
    // NETWORK FIX
    // ===================================

    player.getNetworkingEngine()
    .registerRequestFilter((type, request) => {

        request.allowCrossSiteCredentials = true;

        request.headers['Origin'] = '';

        request.headers['Referer'] = '';

    });

    // ===================================
    // CONFIG
    // ===================================

    player.configure({

        streaming: {

            lowLatencyMode:true,

            bufferingGoal:30,

            rebufferingGoal:2

        }

    });

    // ===================================
    // ERROR
    // ===================================

    player.addEventListener(
        'error',
        onError
    );

    try{

        await player.load(streamUrl);

        await video.play();

        hideLoader();

        setStats('LIVE');

    }
    catch(error){

        onError({
            detail:error
        });

    }

    // ===================================
    // EVENTS
    // ===================================

    video.addEventListener(
        'waiting',
        () => {

            showLoader();

            setStats('BUFFER');

        }
    );

    video.addEventListener(
        'playing',
        () => {

            hideLoader();

            setStats('PLAYING');

        }
    );

}

// ===================================
// ERROR
// ===================================

function onError(event){

    console.error(event);

    setStats('ERROR');

    showLoader();

}

// ===================================
// START
// ===================================

window.addEventListener(
    'load',
    initPlayer
);

</script>

</body>
</html>
