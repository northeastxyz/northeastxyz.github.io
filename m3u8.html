<!doctype html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>JWPlayer CDNBye Player</title>

<!-- CDNBye -->
<script src="https://cdn.jsdelivr.net/npm/cdnbye@latest"></script>

<!-- JW HLS Provider -->
<script src="https://cdn.jsdelivr.net/gh/teranode/jw-provider@0.0.9/provider.hlsjs.js"></script>

<!-- JWPLAYER -->
<script src="https://ssl.p.jwpcdn.com/player/v/8.22.0/jwplayer.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
    font-family:sans-serif;
}

#player{
    width:100%;
    height:100%;
}

.loader{

    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:black;

    z-index:9999;
}

.spinner{

    width:45px;
    height:45px;

    border-radius:50%;

    border:3px solid rgba(255,255,255,.15);
    border-top-color:white;

    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.hidden{
    display:none;
}

.status{

    position:fixed;

    left:10px;
    bottom:10px;

    padding:6px 10px;

    border-radius:999px;

    background:rgba(0,0,0,.45);

    backdrop-filter:blur(5px);

    color:white;

    font-size:12px;

    z-index:99999;
}

</style>

</head>

<body>

<div id="player"></div>

<div class="loader" id="loader">
    <div class="spinner"></div>
</div>

<div class="status" id="status">
    READY
</div>

<script>

// ======================================
// JWPLAYER LICENSE
// ======================================

jwplayer.key =
"uoW6qHjBL3KNudxKVnwa3rt5LlTakbko9e6aQ6VUyKQ=";

// ======================================
// GET STREAM URL
// ======================================

function getRawUrl(){

    const href = window.location.href;

    const index = href.indexOf('?url=');

    if(index === -1){
        return null;
    }

    return decodeURIComponent(
        href.substring(index + 5)
    );
}

const streamUrl = getRawUrl();

const loader =
    document.getElementById('loader');

const statusText =
    document.getElementById('status');

// ======================================
// UI
// ======================================

function showLoader(){
    loader.classList.remove('hidden');
}

function hideLoader(){
    loader.classList.add('hidden');
}

function setStatus(text){
    statusText.innerHTML = text;
}

// ======================================
// NO URL
// ======================================

if(!streamUrl){

    document.body.innerHTML = `
        <div style="
            width:100%;
            height:100%;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-size:18px;
        ">
            NO STREAM URL
        </div>
    `;

}
else{

    // ======================================
    // PLAYER SETUP
    // ======================================

    const player = jwplayer("player");

    player.setup({

        file: streamUrl,

        width: "100%",
        height: "100%",

        autostart: true,

        mute: false,

        controls: true,

        stretching: "uniform",

        primary: "html5",

        preload: "auto",

        playbackRateControls: true,

        repeat: false,

        hlsjsdefault: true,

        hlsjsConfig: {

            enableWorker: true,

            lowLatencyMode: true,

            backBufferLength: 90,

            p2pConfig: {

                live: true

                // token: "ISI_TOKEN_JIKA_PAKAI"

            }

        }

    });

    // ======================================
    // EVENTS
    // ======================================

    player.on('ready', function () {

        setStatus('READY');
    });

    player.on('play', function () {

        hideLoader();

        setStatus('PLAYING');

        // ======================================
        // CDNBYE STATS
        // ======================================

        if(
            player.hls &&
            player.hls.p2pEngine
        ){

            player.hls.p2pEngine.on(
                'stats',
                function ({
                    totalHTTPDownloaded,
                    totalP2PDownloaded
                }){

                    const httpMB =
                        (
                            totalHTTPDownloaded
                            / 1024
                            / 1024
                        ).toFixed(1);

                    const p2pMB =
                        (
                            totalP2PDownloaded
                            / 1024
                            / 1024
                        ).toFixed(1);

                    setStatus(
                        'P2P '
                        + p2pMB
                        + 'MB | HTTP '
                        + httpMB
                        + 'MB'
                    );
                }
            );

        }

    });

    player.on('buffer', function () {

        showLoader();

        setStatus('BUFFERING');
    });

    player.on('bufferChange', function (e) {

        if(e.bufferPercent >= 100){

            hideLoader();
        }

    });

    player.on('error', function (e) {

        showLoader();

        setStatus('ERROR');

        console.log(e);

    });

    player.on('setupError', function (e) {

        showLoader();

        setStatus('SETUP ERROR');

        console.log(e);

    });

    player.on('complete', function () {

        setStatus('COMPLETE');

    });

}

</script>

</body>
</html>
