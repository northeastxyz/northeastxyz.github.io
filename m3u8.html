<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universal HLS Proxy Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

#video{
    width:100vw;
    height:100vh;
    background:#000;
    object-fit:contain;
}

#loading{
    position:absolute;
    color:#fff;
    font-family:sans-serif;
    font-size:14px;
    z-index:999;
}

#error{
    position:absolute;
    bottom:10px;
    left:10px;
    right:10px;
    color:red;
    font-family:sans-serif;
    font-size:12px;
    z-index:999;
    word-break:break-word;
}

</style>

</head>

<body>

<div id="loading">Loading stream...</div>

<div id="error"></div>

<video
    id="video"
    controls
    autoplay
    muted
    playsinline
></video>

<script>

const video = document.getElementById('video');

const loading = document.getElementById('loading');

const errorBox = document.getElementById('error');

function showError(msg){

    console.error(msg);

    errorBox.innerText = msg;
}

async function init() {

    const params = new URLSearchParams(window.location.search);

    // =====================================
    // INPUT URL
    // =====================================

    let streamUrl =
        params.get('m3u8') ||
        params.get('url');

    if (!streamUrl) {

        showError('Missing ?m3u8=');

        return;
    }

    // =====================================
    // AUTO PROXY
    // =====================================

    // GANTI dengan proxy kamu sendiri nanti

    const proxyPrefix =
        'http://43.168.176.59/';

    // kalau bukan proxy
    // otomatis lewat proxy

    if (
        !streamUrl.includes('43.168.176.59')
    ){

        streamUrl =
            proxyPrefix +
            streamUrl
                .replace(/^https?:\/\//, '');

    }

    console.log('FINAL URL:', streamUrl);

    // =====================================
    // Native HLS dulu
    // =====================================

    if (
        video.canPlayType(
            'application/vnd.apple.mpegurl'
        )
    ){

        console.log('Using Native HLS');

        video.src = streamUrl;

        video.addEventListener(
            'loadedmetadata',
            async () => {

                loading.style.display = 'none';

                try {

                    await video.play();

                } catch(e) {

                    console.error(e);

                }
            }
        );

        video.addEventListener('error', () => {

            console.log(
                'Native failed -> HLS.js'
            );

            startHls(streamUrl);

        });

    } else {

        startHls(streamUrl);

    }
}

function startHls(url){

    if (!Hls.isSupported()) {

        showError('HLS not supported');

        return;
    }

    console.log('Using HLS.js');

    const hls = new Hls({

        enableWorker: true,

        lowLatencyMode: false,

        backBufferLength: 30,

        maxBufferLength: 60

    });

    hls.loadSource(url);

    hls.attachMedia(video);

    hls.on(
        Hls.Events.MANIFEST_PARSED,
        async function() {

            loading.style.display = 'none';

            try {

                await video.play();

            } catch(e) {

                console.error(e);

            }
        }
    );

    hls.on(
        Hls.Events.ERROR,
        function(event, data) {

            console.error(data);

            showError(
                'HLS Error: ' +
                data.type +
                ' | ' +
                data.details
            );

            if (data.fatal) {

                switch(data.type) {

                    case Hls.ErrorTypes.NETWORK_ERROR:

                        console.log(
                            'Recover NETWORK_ERROR'
                        );

                        hls.startLoad();

                        break;

                    case Hls.ErrorTypes.MEDIA_ERROR:

                        console.log(
                            'Recover MEDIA_ERROR'
                        );

                        hls.recoverMediaError();

                        break;

                    default:

                        hls.destroy();

                        break;
                }
            }
        }
    );

    video.addEventListener('playing', () => {

        loading.style.display = 'none';

    });

    video.addEventListener('waiting', () => {

        loading.style.display = 'block';

    });

    video.addEventListener('click', () => {

        video.play().catch(() => {});

    });
}

document.addEventListener(
    'DOMContentLoaded',
    init
);

</script>

</body>
</html>
