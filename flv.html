<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLV Player - Live Stream</title>
    <!-- Library flv.js -->
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        .video-wrapper { 
            width: 100%; 
            height: 100%; 
            max-width: 1000px; 
        }
        video { 
            width: 100%; 
            height: 100%; 
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video id="videoElement" controls autoplay muted></video>
    </div>

    <script>
        if (flvjs.isSupported()) {
            const videoElement = document.getElementById('videoElement');
            
            // Mengambil URL FLV dari parameter ?url=
            const params = new URLSearchParams(window.location.search);
            const flvUrl = params.get('url');

            if (flvUrl) {
                const flvPlayer = flvjs.createPlayer({
                    type: 'flv',
                    url: flvUrl,
                    isLive: true,      // Set ke true untuk Live Streaming (low latency)
                    hasAudio: true,
                    hasVideo: true,
                    enableWorker: true // Meningkatkan performa pemutaran
                });
                
                flvPlayer.attachMediaElement(videoElement);
                flvPlayer.load();
                
                // Menangani kebijakan autoplay browser
                const playPromise = flvPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Autoplay dicegah, klik play secara manual.");
                    });
                }

                // Error Handling jika link mati atau salah
                flvPlayer.on(flvjs.Events.ERROR, (errType, errDetail) => {
                    console.error('FLV Error:', errType, errDetail);
                    if (errType === flvjs.Events.NetworkError) {
                        alert("Gagal memuat: Masalah jaringan atau link salah.");
                    }
                });
            } else {
                console.log("Gunakan format: ?url=http://link-anda.flv");
            }
        } else {
            alert("Browser Anda tidak mendukung FLV player ini.");
        }
    </script>
</body>
</html>
