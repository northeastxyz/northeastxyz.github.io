<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern HTML5 FLV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1c1c1c;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            width: 90%;
            max-width: 850px;
            background: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
        }
        .error-msg {
            color: #ff4a4a;
            padding: 20px;
            text-align: center;
            display: none;
            font-weight: bold;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="videoElement" controls autoplay muted></video>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        document.addEventListener("DOMContentLoaded", function() {
            const videoElement = document.getElementById('videoElement');
            const errorMsg = document.getElementById('errorMsg');
            const flvUrl = getQueryParam('url');

            if (!flvUrl) {
                errorMsg.innerText = "Error: Parameter URL tidak ditemukan!";
                errorMsg.style.display = "block";
                videoElement.style.display = "none";
                return;
            }

            // Memastikan library mpegts terdefinisi
            if (typeof mpegts === 'undefined') {
                errorMsg.innerText = "Error: Library mpegts.js gagal dimuat oleh browser. Periksa ekstensi adblock Anda.";
                errorMsg.style.display = "block";
                return;
            }

            // Langsung paksa jalankan pemutar tanpa memedulikan getFeatureList()
            try {
                const player = mpegts.createPlayer({
                    type: 'flv',
                    url: flvUrl,
                    isLive: true
                }, {
                    enableStashBuffer: false,
                    liveBufferLatencyChasing: true
                });
                
                player.attachMediaElement(videoElement);
                player.load();
                
                player.on(mpegts.Events.ERROR, (type, detail, info) => {
                    console.error('Player Error:', type, detail, info);
                    errorMsg.innerText = `Gagal memutar stream.\nDetail: ${type} - ${detail}`;
                    errorMsg.style.display = "block";
                });

            } catch (error) {
                console.error('Initialization Error:', error);
                errorMsg.innerText = `Browser Error: ${error.message}\n\nTips: Coba aktifkan "Hardware Acceleration" di pengaturan Chrome Anda (Settings -> System -> Use graphics acceleration when available).`;
                errorMsg.style.display = "block";
            }
        });
    </script>
</body>
</html>
