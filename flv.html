<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Native HLS Player</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}

</style>

</head>

<body>

<video
    id="video"
    controls
    autoplay
    playsinline
    webkit-playsinline>
</video>

<script>

function getQueryParam(param){

    const params =
        new URLSearchParams(
            window.location.search
        );

    return params.get(param);
}

const video =
    document.getElementById(
        'video'
    );

/*
    Example:
    ?url=https://domain.com/live.m3u8
*/

const videoUrl =
    getQueryParam('url');

if(videoUrl){

    video.src = videoUrl;

    video.play()
    .catch(()=>{});
}

</script>

</body>
</html>
