<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLV Player (Force Type)</title>
    <!-- Library flv.js -->
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        .video-wrapper { 
            width: 100%; 
            height: 100%; 
        }
        video { 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video id="videoElement" controls autoplay muted></video>
    </div>

    <script>
        if (flvjs.isSupported()) {
            const videoElement = document.getElementById('videoElement');
            
            // Mengambil URL dari parameter ?url=
            const params = new URLSearchParams(window.location.search);
            const flvUrl = params.get('url');

            if (flvUrl) {
                const flvPlayer = flvjs.createPlayer({
                    type: 'flv',       // MEMAKSA format FLV meski tanpa ekstensi di URL
                    url: flvUrl,
                    isLive: true,      // Mengurangi delay untuk siaran langsung
                    cors: true,        // Mengizinkan akses lintas domain
                    hasAudio: true,
                    hasVideo: true,
                    enableWorker: true
                }, {
                    enableStashBuffer: false, // Mematikan buffer tambahan agar lebih real-time
                    fixAudioTimestampGap: false
                });
                
                flvPlayer.attachMediaElement(videoElement);
                flvPlayer.load();
                
                // Menangani blokir autoplay dari browser
                const playPromise = flvPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Klik tombol play manual jika video tidak jalan otomatis.");
                    });
                }

                // Error logger
                flvPlayer.on(flvjs.Events.ERROR, (errType, errDetail) => {
                    console.error('Error Type:', errType, 'Detail:', errDetail);
                });
            } else {
                console.log("Masukkan parameter URL, contoh: flv.html?url=LINK_ANDA");
            }
        } else {
            alert("Browser Anda tidak mendukung pemutar FLV ini.");
        }
    </script>
</body>
</html>
