<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Video.js FLV Player</title>

<link href="https://cdn.bootcdn.net/ajax/libs/video.js/7.8.1/video-js.min.css" rel="stylesheet">

<script src="https://cdn.bootcdn.net/ajax/libs/video.js/7.8.1/video.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/videojs-flash/2.2.1/videojs-flash.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.player-box{
    width:90%;
    max-width:900px;
    background:#121212;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,.5);
}

.header{
    padding:18px 22px;
    background:#181818;
    border-bottom:1px solid rgba(255,255,255,.06);
}

.header h1{
    font-size:22px;
    margin-bottom:6px;
}

.header p{
    font-size:13px;
    opacity:.7;
}

.video-wrap{
    padding:20px;
}

.video-js{
    width:100%;
    height:500px;
    border-radius:12px;
    overflow:hidden;
}

.footer{
    padding:14px 20px;
    font-size:12px;
    opacity:.6;
    border-top:1px solid rgba(255,255,255,.06);
}

@media(max-width:768px){
    .video-js{
        height:240px;
    }
}
</style>
</head>

<body>

<div class="player-box">

    <div class="header">
        <h1>FLV Stream Player</h1>
        <p>Video.js + Flash fallback player</p>
    </div>

    <div class="video-wrap">

        <video
            id="flvPlayer"
            class="video-js vjs-default-skin"
            controls
            preload="auto"
            autoplay
            data-setup='{}'>

            <source id="videoSource" src="" type="video/x-flv">

        </video>

    </div>

    <div class="footer">
        Tambahkan parameter URL:
        <br>
        <code>?url=https://domain.com/live.flv</code>
    </div>

</div>

<script>

function getStreamURL(){
    const params = new URLSearchParams(window.location.search);
    return params.get('url');
}

const streamURL = getStreamURL();

if(streamURL){
    document.getElementById('videoSource').src = streamURL;
}

const player = videojs('flvPlayer', {

    techOrder:['flash','html5'],

    controls:true,

    autoplay:true,

    preload:'auto',

    fluid:true,

    flash:{
        swf:'https://cdn.bootcdn.net/ajax/libs/videojs-swf/5.4.2/video-js.swf'
    }

});

player.ready(function(){

    if(streamURL){

        player.src({
            src:streamURL,
            type:'video/x-flv'
        });

        player.play();
    }
});

</script>

</body>
</html>
