<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>PC Stable FLV Player</title>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

#container{
    width:100%;
    height:100%;
    position:relative;
    background:#000;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}

#status{
    position:absolute;
    top:10px;
    left:10px;
    z-index:9999;

    padding:6px 10px;

    font-size:12px;
    font-family:Arial;

    color:#fff;

    background:rgba(0,0,0,.6);

    border-radius:6px;
}

</style>

</head>

<body>

<div id="container">

    <div id="status">
        CONNECTING...
    </div>

    <video
        id="video"
        controls
        autoplay
        muted
        playsinline
        webkit-playsinline
        preload="auto">
    </video>

</div>

<script>

// =========================
// ELEMENT
// =========================

const video =
    document.getElementById(
        'video'
    );

const statusBox =
    document.getElementById(
        'status'
    );

// =========================
// URL PARAM
// =========================

function getQueryParam(param){

    return new URLSearchParams(
        window.location.search
    ).get(param);
}

const sourceUrl =
    getQueryParam('url');

// =========================
// PLAYER
// =========================

let player = null;

let reconnecting = false;

// =========================
// STATUS
// =========================

function setStatus(text){

    console.log(text);

    statusBox.innerText = text;
}

// =========================
// DESTROY PLAYER
// =========================

function destroyPlayer(){

    try{

        if(player){

            player.pause();

            player.unload();

            player.detachMediaElement();

            player.destroy();

            player = null;
        }

    }catch(err){

        console.log(err);
    }
}

// =========================
// START PLAYER
// =========================

async function startPlayer(){

    if(!sourceUrl){

        setStatus('NO URL');

        return;
    }

    if(!mpegts.isSupported()){

        setStatus(
            'MPEGTS NOT SUPPORTED'
        );

        return;
    }

    destroyPlayer();

    setStatus(
        'CONNECTING...'
    );

    console.log(
        'PLAY URL:',
        sourceUrl
    );

    // =========================
    // CREATE PLAYER
    // =========================

    player =
        mpegts.createPlayer({

            type:'flv',

            url:sourceUrl,

            isLive:true

        },{

            enableWorker:true,

            lazyLoad:false,

            liveSync:true,

            liveSyncMaxLatency:3,

            liveBufferLatencyChasing:true,

            stashInitialSize:128,

            autoCleanupSourceBuffer:true,

            autoCleanupMaxBackwardDuration:30,

            autoCleanupMinBackwardDuration:15,

            fixAudioTimestampGap:true

        });

    // =========================
    // ATTACH
    // =========================

    player.attachMediaElement(
        video
    );

    player.load();

    // =========================
    // PLAY
    // =========================

    try{

        await video.play();

        setStatus(
            'PLAYING'
        );

        setTimeout(() => {

            video.muted = false;

        },1000);

    }catch(err){

        setStatus(
            'CLICK TO PLAY'
        );

        console.log(
            'AUTOPLAY ERROR:',
            err
        );
    }

    // =========================
    // PLAYER EVENTS
    // =========================

    player.on(
        mpegts.Events.ERROR,
        (type, detail) => {

            console.log(
                'PLAYER ERROR:',
                type,
                detail
            );

            setStatus(
                'RECONNECTING...'
            );

            reconnect();
        }
    );

    player.on(
        mpegts.Events.LOADING_COMPLETE,
        () => {

            setStatus(
                'STREAM ENDED'
            );
        }
    );

    // =========================
    // VIDEO EVENTS
    // =========================

    video.addEventListener(
        'playing',
        () => {

            setStatus(
                'PLAYING'
            );
        }
    );

    video.addEventListener(
        'waiting',
        () => {

            setStatus(
                'BUFFERING...'
            );
        }
    );

    video.addEventListener(
        'stalled',
        () => {

            setStatus(
                'STALLED'
            );

            reconnect();
        }
    );

    video.addEventListener(
        'error',
        () => {

            setStatus(
                'VIDEO ERROR'
            );

            reconnect();
        }
    );
}

// =========================
// RECONNECT
// =========================

function reconnect(){

    if(reconnecting){

        return;
    }

    reconnecting = true;

    destroyPlayer();

    setTimeout(() => {

        reconnecting = false;

        startPlayer();

    },5000);
}

// =========================
// USER INTERACTION
// =========================

async function forcePlay(){

    try{

        await video.play();

        setStatus(
            'PLAYING'
        );

    }catch(err){

        console.log(err);
    }
}

document.addEventListener(
    'click',
    forcePlay
);

document.addEventListener(
    'touchstart',
    forcePlay
);

// =========================
// VISIBILITY FIX
// =========================

document.addEventListener(
    'visibilitychange',
    () => {

        if(!document.hidden){

            video.play()
            .catch(() => {});
        }
    }
);

// =========================
// WATCHDOG
// =========================

setInterval(() => {

    if(
        video.readyState <= 1
    ){

        console.log(
            'WATCHDOG RECONNECT'
        );

        reconnect();
    }

},30000);

// =========================
// START
// =========================

startPlayer();

</script>

</body>
</html>
