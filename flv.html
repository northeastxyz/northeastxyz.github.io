<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>Jessibuca FLV Player</title>

<script src="https://cdn.jsdelivr.net/npm/jessibuca@3.0.8/dist/jessibuca.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

#player{
    width:100%;
    height:100%;
    background:#000;
}

</style>

</head>

<body>

<div id="player"></div>

<script>

function getQueryParam(param){

    const params =
        new URLSearchParams(
            window.location.search
        );

    return params.get(param);
}

const streamUrl =
    getQueryParam('url');

let player = null;

function startPlayer(){

    if(!streamUrl){

        console.log(
            'NO STREAM URL'
        );

        return;
    }

    if(player){

        try{

            player.destroy();

        }catch(e){}
    }

    player =
        new Jessibuca({

            container:
                document.getElementById(
                    'player'
                ),

            videoBuffer:0.2,

            isResize:true,

            text:'',

            loadingText:'',

            useMSE:true,

            useWCS:false,

            hasAudio:true,

            debug:false,

            showBandwidth:false,

            operateBtns:{
                fullscreen:false,
                screenshot:false,
                play:false,
                audio:false,
                record:false
            },

            forceNoOffscreen:true,

            heartTimeout:10,

            timeout:10,

            loadingTimeout:10,

            keepScreenOn:true,

            controlAutoHide:true,

            isNotMute:false
        });

    player.play(streamUrl);

    setInterval(() => {

        if(
            document.hidden === false
        ){

            player.play(streamUrl);

        }

    }, 30000);
}

startPlayer();

</script>

</body>
</html>
