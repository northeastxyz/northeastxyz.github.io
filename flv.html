<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilibili FLV.js Demo Player</title>
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .mainContainer {
            width: 100%;
            max-width: 800px;
            padding: 15px;
            box-sizing: border-box;
        }
        .video-container {
            position: relative;
            background-color: #000;
            border-radius: 4px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
        .controls {
            margin-top: 10px;
            background-color: #2a2a2a;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
        }
        .log-output {
            color: #00ffcc;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="mainContainer">
    <div class="video-container">
        <video name="videoElement" id="videoElement" controls autoplay muted playsinline></video>
    </div>
    
    <div class="controls">
        <div><strong>Status:</strong> <span id="player-status" class="log-output">Menggali konfigurasi...</span></div>
    </div>
</div>

<script>
    var player = null;

    function getQueryParam(param) {
        var urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    function flv_load(url) {
        var element = document.getElementById('videoElement');
        var statusTxt = document.getElementById('player-status');

        if (player) {
            player.unload();
            player.detachMediaElement();
            player.destroy();
            player = null;
        }

        // Membangun MediaDataSource secara detail sesuai standar Bilibili Demo
        var mediaDataSource = {
            type: 'flv',
            isLive: true,
            url: url,
            hasAudio: true,
            hasVideo: true
        };

        // Konfigurasi internal engine flv.js dari source demo
        var config = {
            enableWorker: true,
            enableStashBuffer: false,
            stashInitialSize: 128,
            lazyLoad: false
        };

        statusTxt.innerText = "Membuat instansi flvjs.createPlayer...";
        player = flvjs.createPlayer(mediaDataSource, config);
        player.attachMediaElement(element);
        
        // Memulai proses streaming biner secara asinkronus
        player.load();
        
        player.play().then(function() {
            statusTxt.innerText = "Stream terhubung! Memutar segmen data.";
        }).catch(function(error) {
            statusTxt.innerText = "Autoplay diblokir browser. Klik Play manual.";
        });

        // Event Listener untuk mendiagnosis crash internal demuxing data biner
        player.on(flvjs.Events.ERROR, function(errorType, errorDetails, errorInfo) {
            console.error('FLV Error:', errorType, errorDetails, errorInfo);
            statusTxt.innerHTML = "<span style='color:#ff4d4d;'>Error: " + errorType + " (" + errorDetails + ")</span>";
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var streamUrl = getQueryParam('url');
        var statusTxt = document.getElementById('player-status');

        if (!streamUrl) {
            statusTxt.innerHTML = "<span style='color:red;'>Error: Parameter ?url= tidak ditemukan!</span>";
            return;
        }

        if (flvjs.isSupported()) {
            flv_load(streamUrl);
        } else {
            statusTxt.innerText = "Browser ini tidak mendukung MSE / flv.js";
        }
    });
</script>

</body>
</html>
