<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>Ultra Minimal FLV Player</title>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;

    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
}

.player{
    position:relative;

    width:100%;
    height:100%;

    background:black;
}

video{
    width:100%;
    height:100%;

    object-fit:contain;

    background:black;
}

/* =========================
MINIMAL CONTROLS
========================= */

.controls{

    position:absolute;

    left:10px;
    bottom:10px;

    z-index:50;
}

.panel{

    background:rgba(0,0,0,.18);

    backdrop-filter:blur(6px);

    border-radius:999px;

    padding:5px 8px;

    border:1px solid rgba(255,255,255,.03);

    display:flex;

    align-items:center;

    gap:8px;
}

button{

    width:28px;
    height:28px;

    border:none;

    border-radius:50%;

    background:rgba(255,255,255,.08);

    color:white;

    font-size:13px;

    cursor:pointer;
}

button:hover{
    background:rgba(255,255,255,.14);
}

#volumeSlider{

    width:70px;

    height:2px;

    accent-color:white;

    cursor:pointer;
}

.stats{

    font-size:9px;

    color:rgba(255,255,255,.65);

    min-width:40px;
}

/* =========================
FULLSCREEN
========================= */

.fullscreen{
    position:absolute;

    right:10px;
    bottom:10px;

    width:40px;
    height:40px;

    border:none;

    border-radius:50%;

    background:rgba(0,0,0,.20);

    backdrop-filter:blur(8px);

    color:white;

    font-size:14px;

    cursor:pointer;

    z-index:60;
}

/* =========================
LOADER
========================= */

.loader{
    position:absolute;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    background:rgba(0,0,0,.35);

    z-index:40;
}

.spinner{
    width:42px;
    height:42px;

    border-radius:50%;

    border:3px solid rgba(255,255,255,.12);

    border-top-color:white;

    animation:spin .8s linear infinite;
}

@keyframes spin{

    to{
        transform:rotate(360deg);
    }
}

.hidden{
    display:none !important;
}

/* =========================
EMPTY
========================= */

.empty{
    position:absolute;

    inset:0;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    color:white;

    text-align:center;

    z-index:30;
}

.empty h1{
    font-size:18px;

    margin-bottom:8px;
}

.empty p{
    color:#888;

    font-size:12px;
}

</style>

</head>

<body>

<div class="player">

    <video
        id="video"
        autoplay
        preload="auto"
        controls
        playsinline
        webkit-playsinline
        x5-video-player-type="h5"
        x5-video-player-fullscreen="true"
        x5-video-orientation="landscape">
    </video>

    <!-- EMPTY -->

    <div
        class="empty"
        id="emptyBox">

        <h1>
            No Stream URL
        </h1>

        <p>
            ?url=https://example.com/live.flv
        </p>

    </div>

    <!-- LOADER -->

    <div
        class="loader hidden"
        id="loader">

        <div class="spinner"></div>

    </div>

    <!-- FULLSCREEN -->

    <button
        class="fullscreen"
        id="fullscreenBtn">

        ⛶

    </button>

    <!-- CONTROLS -->

    <div class="controls">

        <div class="panel">

            <button id="reloadBtn">

                ↻

            </button>

            <input
                type="range"
                id="volumeSlider"
                min="0"
                max="1"
                step="0.01"
                value="1"
            >

            <div
                class="stats"
                id="stats">

                LIVE

            </div>

        </div>

    </div>

</div>

<script>

// =========================
// FORCE MOBILE ENVIRONMENT
// =========================

Object.defineProperty(
    navigator,
    'userAgent',
    {
        get: () =>
        'Mozilla/5.0 (Linux; Android 13; SM-G991B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36'
    }
);

Object.defineProperty(
    navigator,
    'platform',
    {
        get: () => 'Android'
    }
);

Object.defineProperty(
    navigator,
    'maxTouchPoints',
    {
        get: () => 5
    }
);

// =========================
// ELEMENT
// =========================

const video =
    document.getElementById(
        'video'
    );

const loader =
    document.getElementById(
        'loader'
    );

const statsBox =
    document.getElementById(
        'stats'
    );

const reloadBtn =
    document.getElementById(
        'reloadBtn'
    );

const fullscreenBtn =
    document.getElementById(
        'fullscreenBtn'
    );

const volumeSlider =
    document.getElementById(
        'volumeSlider'
    );

const emptyBox =
    document.getElementById(
        'emptyBox'
    );

// =========================
// PLAYER STATE
// =========================

let player = null;

let reconnectCount = 0;

let reconnectTimer = null;

// =========================
// GET URL
// =========================

function getRawUrl(){

    const href =
        window.location.href;

    const index =
        href.indexOf('?url=');

    if(index === -1){

        return null;
    }

    return href.substring(
        index + 5
    );
}

const rawUrl =
    getRawUrl();

let currentUrl = null;

if(rawUrl){

    currentUrl =
        decodeURIComponent(
            rawUrl
        );
}

// =========================
// LOADER
// =========================

function showLoader(){

    loader.classList.remove(
        'hidden'
    );
}

function hideLoader(){

    loader.classList.add(
        'hidden'
    );
}

// =========================
// DESTROY
// =========================

function destroyPlayer(){

    try{

        if(player){

            player.pause();

            player.unload();

            player.detachMediaElement();

            player.destroy();

            player = null;
        }

    }catch(e){}
}

// =========================
// RECONNECT
// =========================

function reconnect(){

    if(!currentUrl){

        return;
    }

    destroyPlayer();

    reconnectCount++;

    const delay =
        Math.min(
            10000,
            1000 * (
                2 ** reconnectCount
            )
        );

    clearTimeout(
        reconnectTimer
    );

    reconnectTimer =
        setTimeout(
            startPlayer,
            delay
        );
}

// =========================
// START PLAYER
// =========================

function startPlayer(){

    if(!currentUrl){

        emptyBox.style.display =
            'flex';

        return;
    }

    emptyBox.style.display =
        'none';

    destroyPlayer();

    showLoader();

    if(
        typeof mpegts ===
        'undefined'
    ){

        return;
    }

    player =
        mpegts.createPlayer({

            type:'flv',

            isLive:true,

            url:currentUrl

        },{

            enableWorker:true,

            lazyLoad:false,

            liveSync:false,

            liveBufferLatencyChasing:false,

            stashInitialSize:384,

            autoCleanupSourceBuffer:true,

            autoCleanupMaxBackwardDuration:90,

            autoCleanupMinBackwardDuration:30
        });

    player.attachMediaElement(
        video
    );

    player.load();

    // =========================
    // AUDIO
    // =========================

    video.muted = false;

    video.volume =
        volumeSlider.value;

    // =========================
    // AUTOPLAY
    // =========================

    const tryPlay = () => {

        video.play()
        .catch(() => {});
    };

    tryPlay();

    document.addEventListener(
        'touchstart',
        tryPlay,
        { once:true }
    );

    document.addEventListener(
        'click',
        tryPlay,
        { once:true }
    );

    // =========================
    // ERROR
    // =========================

    player.on(
        mpegts.Events.ERROR,
        reconnect
    );

    // =========================
    // STATS
    // =========================

    player.on(
        mpegts.Events
            .STATISTICS_INFO,

        stats => {

            statsBox.innerHTML =
                'LIVE';
        }
    );
}

// =========================
// EVENTS
// =========================

video.addEventListener(
    'playing',
    () => {

        hideLoader();

        reconnectCount = 0;
    }
);

video.addEventListener(
    'waiting',
    () => {

        showLoader();

        // AUTO RESUME

        setTimeout(() => {

            video.play()
            .catch(() => {});

        }, 500);
    }
);

video.addEventListener(
    'stalled',
    reconnect
);

video.addEventListener(
    'error',
    reconnect
);

// =========================
// RELOAD
// =========================

reloadBtn.addEventListener(
    'click',
    () => {

        reconnectCount = 0;

        startPlayer();
    }
);

// =========================
// VOLUME
// =========================

volumeSlider.addEventListener(
    'input',
    () => {

        video.volume =
            volumeSlider.value;

        video.muted =
            volumeSlider.value == 0;
    }
);

// =========================
// FULLSCREEN LANDSCAPE
// =========================

fullscreenBtn.addEventListener(
    'click',
    async () => {

        const playerWrap =
            document.querySelector(
                '.player'
            );

        if(
            !document
                .fullscreenElement
        ){

            await playerWrap
                .requestFullscreen();

            if(
                screen.orientation &&
                screen.orientation.lock
            ){

                screen.orientation
                    .lock(
                        'landscape'
                    )
                    .catch(() => {});
            }

        }else{

            document
                .exitFullscreen();

            if(
                screen.orientation &&
                screen.orientation.unlock
            ){

                screen.orientation
                    .unlock();
            }
        }
    }
);

// =========================
// KEEP PLAYING
// =========================

document.addEventListener(
    'visibilitychange',
    () => {

        video.play()
        .catch(() => {});
    }
);

// =========================
// AUTO START
// =========================

startPlayer();

</script>

</body>
</html>
