<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huya Stable PC Player</title>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; }
        html, body{ width:100%; height:100%; overflow:hidden; background:#000; font-family:Arial,sans-serif; }
        #app{ width:100%; height:100%; position:relative; background:#000; }
        video{ width:100%; height:100%; object-fit:contain; background:#000; }
        #status{ position:absolute; top:10px; left:10px; z-index:99999; padding:8px 12px; border-radius:8px; background:rgba(0,0,0,.7); color:#fff; font-size:12px; backdrop-filter:blur(4px); }
        #loading{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:9999; color:#fff; font-size:14px; text-align:center; }
    </style>
</head>
<body>

<div id="app">
    <div id="status">INITIALIZING...</div>
    <div id="loading">Loading Stream...</div>
    <video id="video" controls autoplay playsinline webkit-playsinline></video>
</div>

<script>
    const video = document.getElementById('video');
    const statusBox = document.getElementById('status');
    const loadingBox = document.getElementById('loading');

    function getQuery(name){ return new URLSearchParams(location.search).get(name); }
    const streamURL = getQuery('url');

    let player = null;
    let reconnecting = false;

    function setStatus(text){ console.log(text); statusBox.innerHTML = text; }
    function showLoading(show){ loadingBox.style.display = show ? 'block' : 'none'; }

    function destroyPlayer(){
        try {
            if(player){
                player.pause();
                player.unload();
                player.detachMediaElement();
                player.destroy();
                player = null;
            }
        } catch(err){ console.log('DESTROY ERROR:', err); }
    }

    async function startPlayer(){
        if(!streamURL){ setStatus('NO STREAM URL'); return; }
        if(!mpegts.getFeatureList().mseLivePlayback){ setStatus('MSE LIVE NOT SUPPORTED'); return; }

        destroyPlayer();
        setStatus('CONNECTING...');
        showLoading(true);

        player = mpegts.createPlayer({
            type: 'flv',
            url: streamURL,
            isLive: true,
            cors: true,
            hasAudio: true,  // <-- DIPERBAIKI: Harus true untuk mengaktifkan audio
            hasVideo: true
        }, {
            enableWorker: false,
            enableStashBuffer: false,
            lazyLoad: false,
            liveSync: false
        });

        player.attachMediaElement(video);
        player.load();

        try {
            await video.play();
            setStatus('PLAYING');
            showLoading(false);
        } catch(err){
            setStatus('CLICK TO PLAY');
            showLoading(false);
        }
    }

    function forcePlay(){
        if(video.paused){
            video.play().then(() => {
                video.muted = false; // Memastikan audio aktif setelah interaksi
                setStatus('PLAYING');
            }).catch(e => console.log(e));
        }
    }

    document.addEventListener('click', forcePlay);
    document.addEventListener('touchstart', forcePlay);
    document.addEventListener('visibilitychange', () => { if(!document.hidden) video.play().catch(()=>{}); });

    startPlayer();
</script>

</body>
</html>
