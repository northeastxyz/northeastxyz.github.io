<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huya Live Player Final</title>
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: sans-serif; }
        .container { width: 100%; max-width: 850px; text-align: center; padding: 10px; }
        video { width: 100%; background-color: #111; border-radius: 8px; }
        #status { margin-top: 15px; color: #00ffcc; font-size: 14px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <video id="videoElement" controls autoplay muted playsinline></video>
    <div id="status">Memulai player...</div>
</div>

<script>
    function getQueryParam(param) {
        return new URLSearchParams(window.location.search).get(param);
    }

    document.addEventListener("DOMContentLoaded", function() {
        const videoElement = document.getElementById('videoElement');
        const statusDiv = document.getElementById('status');
        const streamUrl = getQueryParam('url');

        if (!streamUrl) {
            statusDiv.innerHTML = "<span style='color:red;'>Error: URL Kosong!</span>";
            return;
        }

        if (flvjs.isSupported()) {
            statusDiv.innerText = "Koneksi langsung aktif. Membuka stream...";

            const flvPlayer = flvjs.createPlayer({
                type: 'flv',
                url: streamUrl,
                isLive: true,
                hasAudio: true,
                hasVideo: true
            }, {
                enableWorker: true,
                enableStashBuffer: false, // WAJIB untuk live stream biar gak stuck buffering
                stashInitialSize: 128
            });

            flvPlayer.attachMediaElement(videoElement);
            flvPlayer.load();

            flvPlayer.play().then(() => {
                statusDiv.innerText = "Streaming Berhasil! Aktifkan suara via ikon speaker.";
            }).catch(err => {
                statusDiv.innerText = "Klik tombol PLAY tengah / manual untuk memulai.";
            });

            flvPlayer.on(flvjs.Events.ERROR, function(errorType, errorDetails, errorInfo) {
                console.error("Detail Error:", errorType, errorDetails, errorInfo);
                statusDiv.innerHTML = "<span style='color:#ff4d4d;'>Gagal memproses stream. Cek Tab Console (F12).</span>";
            });
        } else {
            statusDiv.innerText = "Browser tidak mendukung flv.js";
        }
    });
</script>

</body>
</html>
