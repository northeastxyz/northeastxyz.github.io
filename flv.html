<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Native Video Test</title>

<style>

html,
body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
}

video{
    width:100%;
    height:100%;
    background:#000;
}

</style>

</head>

<body>

<video
    id="video"
    controls
    autoplay
    playsinline
    webkit-playsinline>
</video>

<script>

const video =
    document.getElementById(
        'video'
    );

const url =
    new URLSearchParams(
        location.search
    ).get('url');

console.log(
    'VIDEO URL:',
    url
);

video.src = url;

video.load();

video.play()
.catch(err => {

    console.error(
        'PLAY ERROR:',
        err
    );

    alert(
        err.message
    );
});

video.onerror = () => {

    console.log(
        video.error
    );

    alert(
        'VIDEO ERROR'
    );
};

</script>

</body>
</html>
