<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Huya FLV Player Debug</title>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>

<style>

html,
body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

video{
    width:100%;
    height:100%;
    background:#000;
    object-fit:contain;
}

#status{
    position:fixed;
    left:10px;
    bottom:60px;

    z-index:99999;

    background:rgba(0,0,0,.7);

    color:#fff;

    font-family:Arial;

    font-size:12px;

    padding:10px;

    border-radius:8px;

    min-width:220px;
}

</style>

</head>

<body>

<div id="status">

    STATUS : INIT<br>
    SPEED : 0 KB/s<br>
    BYTES : 0

</div>

<video
    id="video"
    controls
    autoplay
    muted
    playsinline>
</video>

<script>

const video =
    document.getElementById(
        'video'
    );

const statusBox =
    document.getElementById(
        'status'
    );

function getQuery(name){

    return new URLSearchParams(
        location.search
    ).get(name);
}

const streamUrl =
    getQuery('url');

let player = null;

let reconnecting = false;

let lastBytes = 0;

function updateStatus(
    status,
    speed,
    bytes
){

    statusBox.innerHTML =
        `
        STATUS : ${status}<br>
        SPEED : ${speed}<br>
        BYTES : ${bytes}
        `;
}

function destroyPlayer(){

    try{

        if(player){

            player.pause();

            player.unload();

            player.detachMediaElement();

            player.destroy();

            player = null;
        }

    }catch(e){}
}

function reconnect(){

    if(reconnecting){

        return;
    }

    reconnecting = true;

    updateStatus(
        'RECONNECTING',
        '0',
        '0'
    );

    destroyPlayer();

    setTimeout(()=>{

        reconnecting = false;

        startPlayer();

    },5000);
}

async function startPlayer(){

    if(!streamUrl){

        updateStatus(
            'NO URL',
            '0',
            '0'
        );

        return;
    }

    if(!mpegts.isSupported()){

        updateStatus(
            'MPEGTS NOT SUPPORTED',
            '0',
            '0'
        );

        return;
    }

    destroyPlayer();

    updateStatus(
        'CONNECTING',
        '0',
        '0'
    );

    player =
        mpegts.createPlayer({

            type:'flv',

            url:streamUrl,

            isLive:true,

            cors:true

        },{

            enableWorker:true,

            lazyLoad:false,

            enableStashBuffer:false,

            stashInitialSize:64,

            autoCleanupSourceBuffer:true,

            autoCleanupMaxBackwardDuration:30,

            autoCleanupMinBackwardDuration:10

        });

    player.attachMediaElement(
        video
    );

    player.load();

    try{

        await video.play();

    }catch(e){

        console.log(
            'PLAY BLOCKED',
            e
        );
    }

    player.on(
        mpegts.Events.MEDIA_INFO,
        info=>{

            console.log(
                'MEDIA INFO',
                info
            );

            updateStatus(
                'MEDIA DETECTED',
                '0',
                '0'
            );
        }
    );

    player.on(
        mpegts.Events.STATISTICS_INFO,
        stats=>{

            console.log(
                stats
            );

            const bytes =
                stats.speed || 0;

            const kb =
                (
                    bytes /
                    1024
                ).toFixed(2);

            updateStatus(

                'PLAYING',

                kb + ' KB/s',

                bytes

            );

            lastBytes = bytes;
        }
    );

    player.on(
        mpegts.Events.ERROR,
        (type,detail)=>{

            console.log(
                type,
                detail
            );

            updateStatus(
                'ERROR',
                '0',
                '0'
            );

            reconnect();
        }
    );
}

video.addEventListener(
    'stalled',
    reconnect
);

video.addEventListener(
    'error',
    reconnect
);

video.addEventListener(
    'waiting',
    ()=>{

        updateStatus(
            'BUFFERING',
            '0',
            lastBytes
        );
    }
);

setInterval(()=>{

    if(
        video.readyState <= 1
    ){

        reconnect();
    }

},30000);

document.addEventListener(
    'click',
    ()=>{

        video.play()
        .catch(()=>{});
    }
);

startPlayer();

</script>

</body>
</html>
