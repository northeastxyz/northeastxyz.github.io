<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>Ultra Low Latency FLV/HLS Live Player</title>

<!-- MPEGTS -->
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>

<!-- HLS -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#050505;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden;
    color:white;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:12px;
}

.player-shell{
    width:100%;
    max-width:520px;
    background:#0f0f10;
    border:1px solid #1f1f22;
    border-radius:18px;
    overflow:hidden;
    box-shadow:
        0 20px 60px rgba(0,0,0,.65),
        inset 0 1px 0 rgba(255,255,255,.04);
}

.video-wrapper{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:black;
    overflow:hidden;
}

video{
    width:100%;
    height:100%;
    background:black;
    object-fit:contain;
}

.top-ui{
    position:absolute;
    top:12px;
    left:12px;
    right:12px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    z-index:20;
}

.live-badge{
    display:flex;
    align-items:center;
    gap:8px;

    background:rgba(0,0,0,.55);
    backdrop-filter:blur(10px);

    padding:8px 12px;
    border-radius:999px;

    font-size:13px;
    font-weight:600;
}

.live-dot{
    width:10px;
    height:10px;
    background:#ff2d55;
    border-radius:50%;

    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{transform:scale(.9);opacity:.7}
    50%{transform:scale(1.15);opacity:1}
    100%{transform:scale(.9);opacity:.7}
}

.control-bar{
    padding:14px;
    background:#111214;
}

.status{
    font-size:13px;
    color:#a1a1aa;
    margin-bottom:12px;
    word-break:break-all;
}

.controls{
    display:flex;
    gap:10px;
}

button,select{
    border:none;
    outline:none;
    border-radius:12px;
    background:#1b1c20;
    color:white;
    padding:12px;
    font-size:14px;
}

button{
    cursor:pointer;
    flex:1;
    transition:.2s;
}

button:hover{
    background:#24262b;
}

select{
    width:120px;
}

.error{
    margin-top:12px;
    color:#ff5b5b;
    font-size:13px;
    display:none;
}

.loader{
    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.45);
    backdrop-filter:blur(4px);

    z-index:15;
}

.spinner{
    width:52px;
    height:52px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,.12);
    border-top-color:white;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg)}
}

.hidden{
    display:none !important;
}

.fullscreen-btn{
    position:absolute;
    right:12px;
    bottom:12px;

    z-index:30;

    width:44px;
    height:44px;

    border-radius:12px;

    border:none;

    background:rgba(0,0,0,.55);

    color:white;

    cursor:pointer;

    backdrop-filter:blur(10px);
}

@media(max-width:640px){

    body{
        padding:0;
    }

    .player-shell{
        width:100%;
        height:100%;
        max-width:none;
        border-radius:0;
    }

    .video-wrapper{
        height:100vh;
        aspect-ratio:auto;
    }
}
</style>
</head>
<body>

<div class="player-shell">

    <div class="video-wrapper">

        <video
            id="video"
            autoplay
            muted
            controls
            playsinline
            webkit-playsinline
            x5-playsinline>
        </video>

        <div class="loader" id="loader">
            <div class="spinner"></div>
        </div>

        <div class="top-ui">
            <div class="live-badge">
                <div class="live-dot"></div>
                LIVE
            </div>

            <select id="quality">
                <option value="1080">1080p</option>
                <option value="720" selected>720p</option>
                <option value="480">480p</option>
                <option value="360">360p</option>
            </select>
        </div>

        <button class="fullscreen-btn" id="fullscreenBtn">
            ⛶
        </button>

    </div>

    <div class="control-bar">

        <div class="status" id="status">
            Initializing...
        </div>

        <div class="controls">
            <button id="reloadBtn">Reload Stream</button>
        </div>

        <div class="error" id="errorBox">
            Stream disconnected. Reconnecting...
        </div>

    </div>

</div>

<script>

const video = document.getElementById('video');
const statusText = document.getElementById('status');
const reloadBtn = document.getElementById('reloadBtn');
const errorBox = document.getElementById('errorBox');
const qualitySelect = document.getElementById('quality');
const loader = document.getElementById('loader');
const fullscreenBtn = document.getElementById('fullscreenBtn');

let flvPlayer = null;
let hlsPlayer = null;

let reconnectAttempts = 0;
let reconnectTimer = null;
let watchdogTimer = null;

const urlParams = new URLSearchParams(window.location.search);

const roomId = urlParams.get('id') || '30805928';

const proxyHost = 'https://flv.northeastxyz.workers.dev';

function getFLVUrl(){

    const quality = qualitySelect.value;

    return `${proxyHost}/?id=${roomId}&q=${quality}`;
}

function getHLSUrl(){

    const quality = qualitySelect.value;

    return `${proxyHost}/hls?id=${roomId}&q=${quality}`;
}

function showLoader(){
    loader.classList.remove('hidden');
}

function hideLoader(){
    loader.classList.add('hidden');
}

function setStatus(text){
    statusText.textContent = text;
}

function destroyPlayers(){

    try{

        if(flvPlayer){

            flvPlayer.pause();

            flvPlayer.unload();

            flvPlayer.detachMediaElement();

            flvPlayer.destroy();

            flvPlayer = null;
        }

    }catch(e){
        console.warn(e);
    }

    try{

        if(hlsPlayer){

            hlsPlayer.destroy();

            hlsPlayer = null;
        }

    }catch(e){
        console.warn(e);
    }
}

function resetWatchdog(){

    clearTimeout(watchdogTimer);

    watchdogTimer = setTimeout(() => {

        console.warn('Watchdog timeout');

        reconnect();

    }, 15000);
}

function reconnect(){

    destroyPlayers();

    errorBox.style.display = 'block';

    const delay = Math.min(
        15000,
        1000 * (2 ** reconnectAttempts)
    );

    reconnectAttempts++;

    setStatus(`Reconnecting in ${delay/1000}s...`);

    clearTimeout(reconnectTimer);

    reconnectTimer = setTimeout(() => {

        startFLV();

    }, delay);
}

function attachVideoEvents(){

    video.addEventListener('playing', () => {

        hideLoader();

        errorBox.style.display = 'none';

        reconnectAttempts = 0;

        setStatus('LIVE');

        resetWatchdog();
    });

    video.addEventListener('waiting', () => {

        showLoader();

        setStatus('Buffering...');
    });

    video.addEventListener('stalled', () => {

        reconnect();
    });

    video.addEventListener('error', () => {

        reconnect();
    });

    video.addEventListener('timeupdate', () => {

        resetWatchdog();
    });
}

async function safePlay(){

    try{

        await video.play();

    }catch(err){

        console.warn('Autoplay blocked', err);

        setStatus('Tap play to start');
    }
}

function startFLV(){

    destroyPlayers();

    showLoader();

    setStatus('Connecting FLV...');

    const flvUrl = getFLVUrl();

    console.log('FLV:', flvUrl);

    if(
        typeof mpegts !== 'undefined' &&
        mpegts.getFeatureList().mseLivePlayback
    ){

        flvPlayer = mpegts.createPlayer({

            type:'flv',

            isLive:true,

            cors:true,

            url:flvUrl

        },{

            enableWorker:true,

            lazyLoad:false,

            deferLoadAfterSourceOpen:false,

            liveBufferLatencyChasing:true,

            liveSync:true,

            autoCleanupSourceBuffer:true,

            autoCleanupMaxBackwardDuration:30,

            autoCleanupMinBackwardDuration:10,

            stashInitialSize:64,

            fixAudioTimestampGap:false

        });

        flvPlayer.attachMediaElement(video);

        flvPlayer.load();

        safePlay();

        flvPlayer.on(mpegts.Events.ERROR, (type, detail) => {

            console.error('FLV ERROR:', type, detail);

            startHLS();
        });

    }else{

        startHLS();
    }
}

function startHLS(){

    destroyPlayers();

    showLoader();

    setStatus('Switching to HLS fallback...');

    const hlsUrl = getHLSUrl();

    console.log('HLS:', hlsUrl);

    if(Hls.isSupported()){

        hlsPlayer = new Hls({

            lowLatencyMode:true,

            backBufferLength:30

        });

        hlsPlayer.loadSource(hlsUrl);

        hlsPlayer.attachMedia(video);

        hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {

            safePlay();
        });

        hlsPlayer.on(Hls.Events.ERROR, (event, data) => {

            console.error('HLS ERROR:', data);

            reconnect();
        });

    }else if(video.canPlayType('application/vnd.apple.mpegurl')){

        video.src = hlsUrl;

        safePlay();

    }else{

        setStatus('Browser not supported');

        errorBox.style.display = 'block';
    }
}

reloadBtn.addEventListener('click', () => {

    reconnectAttempts = 0;

    startFLV();
});

qualitySelect.addEventListener('change', () => {

    reconnectAttempts = 0;

    startFLV();
});

fullscreenBtn.addEventListener('click', () => {

    if(!document.fullscreenElement){

        document.querySelector('.video-wrapper')
            .requestFullscreen();

    }else{

        document.exitFullscreen();
    }
});

document.addEventListener('visibilitychange', () => {

    if(!document.hidden){

        reconnectAttempts = 0;

        startFLV();
    }
});

window.addEventListener('online', () => {

    reconnectAttempts = 0;

    startFLV();
});

window.addEventListener('offline', () => {

    setStatus('Network Offline');
});

attachVideoEvents();

startFLV();

</script>

</body>
</html>
