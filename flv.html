<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>Stable Huya FLV Player</title>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}

</style>

</head>

<body>

<video
    id="video"
    controls
    autoplay
    muted
    playsinline
    webkit-playsinline
    preload="auto">
</video>

<script>

// =========================
// ELEMENT
// =========================

const video =
    document.getElementById(
        'video'
    );

// =========================
// GET URL
// =========================

function getQueryParam(param){

    const params =
        new URLSearchParams(
            window.location.search
        );

    return params.get(param);
}

const currentUrl =
    getQueryParam('url');

// =========================
// PLAYER
// =========================

let player = null;

let reconnecting = false;

// =========================
// DESTROY
// =========================

function destroyPlayer(){

    try{

        if(player){

            player.pause();

            player.unload();

            player.detachMediaElement();

            player.destroy();

            player = null;
        }

    }catch(e){}
}

// =========================
// RECONNECT
// =========================

function reconnect(){

    if(
        reconnecting
    ){

        return;
    }

    reconnecting = true;

    destroyPlayer();

    // jangan reconnect terlalu cepat
    // supaya tidak dianggap bot

    setTimeout(() => {

        reconnecting = false;

        startPlayer();

    }, 8000);
}

// =========================
// GET REAL URL
// =========================

async function getRealUrl(url){

    try{

        const response =
            await fetch(url, {

                method:'GET',

                mode:'cors',

                redirect:'follow',

                cache:'no-cache',

                credentials:'omit',

                headers:{

                    'Accept':'*/*',

                    'Origin':
                    location.origin,

                    'Referer':
                    location.href
                }
            });

        console.log(
            'HTTP STATUS:',
            response.status
        );

        console.log(
            'FINAL URL:',
            response.url
        );

        console.log(
            'CONTENT TYPE:',
            response.headers.get(
                'content-type'
            )
        );

        return response.url;

    }catch(err){

        console.log(
            'FETCH ERROR:',
            err
        );

        return url;
    }
}

// =========================
// START PLAYER
// =========================

async function startPlayer(){

    if(!currentUrl){

        console.log(
            'NO URL'
        );

        return;
    }

    if(
        !mpegts.isSupported()
    ){

        console.log(
            'MPEGTS NOT SUPPORTED'
        );

        return;
    }

    destroyPlayer();

    // =========================
    // FOLLOW 302
    // =========================

    const realUrl =
        await getRealUrl(
            currentUrl
        );

    console.log(
        'PLAY URL:',
        realUrl
    );

    // =========================
    // CREATE PLAYER
    // =========================

    player =
        mpegts.createPlayer({

            type:'flv',

            url:realUrl,

            isLive:true,

            cors:true

        },{

            enableWorker:false,

            lazyLoad:false,

            liveSync:false,

            liveBufferLatencyChasing:true,

            fixAudioTimestampGap:true,

            autoCleanupSourceBuffer:true,

            autoCleanupMaxBackwardDuration:20,

            autoCleanupMinBackwardDuration:10,

            stashInitialSize:128,

            withCredentials:false,

            // Huya lebih stabil tanpa range
            seekType:'param',

            headers:{

                'Accept':'*/*',

                'Origin':
                'https://live.metshop.top',

                'Referer':
                'https://live.metshop.top/'
            }
        });

    player.attachMediaElement(
        video
    );

    player.load();

    // =========================
    // AUTOPLAY
    // =========================

    const playVideo = () => {

        video.play()
        .then(() => {

            // unmute setelah play

            setTimeout(() => {

                video.muted = false;

            }, 1000);

        })
        .catch(err => {

            console.log(
                'PLAY ERROR:',
                err
            );
        });
    };

    playVideo();

    document.addEventListener(
        'click',
        playVideo,
        { once:true }
    );

    document.addEventListener(
        'touchstart',
        playVideo,
        { once:true }
    );

    // =========================
    // PLAYER EVENTS
    // =========================

    player.on(
        mpegts.Events.ERROR,
        (type, detail) => {

            console.log(
                'PLAYER ERROR:',
                type,
                detail
            );

            reconnect();
        }
    );
}

// =========================
// VIDEO EVENTS
// =========================

video.addEventListener(
    'stalled',
    reconnect
);

video.addEventListener(
    'error',
    reconnect
);

video.addEventListener(
    'waiting',
    () => {

        video.play()
        .catch(() => {});
    }
);

// =========================
// KEEP PLAYING
// =========================

document.addEventListener(
    'visibilitychange',
    () => {

        if(
            !document.hidden
        ){

            video.play()
            .catch(() => {});
        }
    }
);

// =========================
// WATCHDOG
// =========================

setInterval(() => {

    if(
        video.readyState <= 1
    ){

        console.log(
            'WATCHDOG RECONNECT'
        );

        reconnect();
    }

}, 60000);

// =========================
// START
// =========================

startPlayer();

</script>

</body>
</html>
