<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>Hybrid ExoPlayer UI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;
    height:100%;

    background:black;

    overflow:hidden;

    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
}

.player{

    position:relative;

    width:100%;
    height:100%;

    background:black;
}

/* =========================
NATIVE EXOPLAYER SURFACE
========================= */

#nativePlayer{

    position:absolute;

    inset:0;

    width:100%;
    height:100%;

    background:black;
}

/* =========================
MINIMAL CONTROLS
========================= */

.controls{

    position:absolute;

    left:10px;
    bottom:10px;

    z-index:9999;
}

.panel{

    background:rgba(0,0,0,.18);

    backdrop-filter:blur(6px);

    border-radius:999px;

    padding:5px 8px;

    border:1px solid rgba(255,255,255,.03);

    display:flex;

    align-items:center;

    gap:8px;
}

button{

    width:28px;
    height:28px;

    border:none;

    border-radius:50%;

    background:rgba(255,255,255,.08);

    color:white;

    font-size:13px;

    cursor:pointer;
}

button:hover{

    background:rgba(255,255,255,.14);
}

#volumeSlider{

    width:70px;

    height:2px;

    accent-color:white;

    cursor:pointer;
}

.stats{

    font-size:9px;

    color:rgba(255,255,255,.65);

    min-width:40px;
}

/* =========================
FULLSCREEN
========================= */

.fullscreen{

    position:absolute;

    right:10px;
    bottom:10px;

    width:40px;
    height:40px;

    border:none;

    border-radius:50%;

    background:rgba(0,0,0,.20);

    backdrop-filter:blur(8px);

    color:white;

    font-size:14px;

    cursor:pointer;

    z-index:9999;
}

/* =========================
LOADER
========================= */

.loader{

    position:absolute;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    background:rgba(0,0,0,.35);

    z-index:9998;
}

.spinner{

    width:42px;
    height:42px;

    border-radius:50%;

    border:3px solid rgba(255,255,255,.12);

    border-top-color:white;

    animation:spin .8s linear infinite;
}

@keyframes spin{

    to{
        transform:rotate(360deg);
    }
}

.hidden{
    display:none !important;
}

/* =========================
EMPTY
========================= */

.empty{

    position:absolute;

    inset:0;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    color:white;

    text-align:center;

    z-index:9997;
}

.empty h1{

    font-size:18px;

    margin-bottom:8px;
}

.empty p{

    color:#888;

    font-size:12px;
}

</style>

</head>

<body>

<div class="player">

    <!-- EXOPLAYER SURFACE -->

    <div id="nativePlayer"></div>

    <!-- EMPTY -->

    <div
        class="empty"
        id="emptyBox">

        <h1>
            No Stream URL
        </h1>

        <p>
            ?url=https://example.com/live.flv
        </p>

    </div>

    <!-- LOADER -->

    <div
        class="loader hidden"
        id="loader">

        <div class="spinner"></div>

    </div>

    <!-- FULLSCREEN -->

    <button
        class="fullscreen"
        id="fullscreenBtn">

        ⛶

    </button>

    <!-- CONTROLS -->

    <div class="controls">

        <div class="panel">

            <button id="reloadBtn">

                ↻

            </button>

            <input
                type="range"
                id="volumeSlider"
                min="0"
                max="1"
                step="0.01"
                value="1"
            >

            <div
                class="stats"
                id="stats">

                LIVE
            </div>

        </div>

    </div>

</div>

<script>

// =========================
// FORCE MOBILE ENVIRONMENT
// =========================

Object.defineProperty(
    navigator,
    'userAgent',
    {
        get: () =>
        'Mozilla/5.0 (Linux; Android 13; SM-G991B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36'
    }
);

// =========================
// ELEMENT
// =========================

const loader =
    document.getElementById(
        'loader'
    );

const statsBox =
    document.getElementById(
        'stats'
    );

const reloadBtn =
    document.getElementById(
        'reloadBtn'
    );

const fullscreenBtn =
    document.getElementById(
        'fullscreenBtn'
    );

const volumeSlider =
    document.getElementById(
        'volumeSlider'
    );

const emptyBox =
    document.getElementById(
        'emptyBox'
    );

// =========================
// GET STREAM URL
// =========================

function getRawUrl(){

    const href =
        window.location.href;

    const index =
        href.indexOf('?url=');

    if(index === -1){

        return null;
    }

    return href.substring(
        index + 5
    );
}

const rawUrl =
    getRawUrl();

let currentUrl = null;

if(rawUrl){

    currentUrl =
        decodeURIComponent(
            rawUrl
        );
}

// =========================
// LOADER
// =========================

function showLoader(){

    loader.classList.remove(
        'hidden'
    );
}

function hideLoader(){

    loader.classList.add(
        'hidden'
    );
}

// =========================
// EXOPLAYER BRIDGE
// =========================

function playNativeStream(){

    if(!currentUrl){

        emptyBox.style.display =
            'flex';

        return;
    }

    emptyBox.style.display =
        'none';

    showLoader();

    // =========================
    // CALL NATIVE ANDROID
    // =========================

    if(
        window.Android &&
        Android.playStream
    ){

        Android.playStream(
            currentUrl
        );

        Android.setVolume(
            parseFloat(
                volumeSlider.value
            )
        );

        statsBox.innerHTML =
            'EXOPLAYER';

        // READY

        setTimeout(() => {

            hideLoader();

        }, 1000);

    }else{

        // WEB FALLBACK

        statsBox.innerHTML =
            'WEB MODE';

        console.warn(
            'Android bridge not detected'
        );

        hideLoader();
    }
}

// =========================
// RELOAD
// =========================

reloadBtn.addEventListener(
    'click',
    () => {

        playNativeStream();
    }
);

// =========================
// VOLUME
// =========================

volumeSlider.addEventListener(
    'input',
    () => {

        if(
            window.Android &&
            Android.setVolume
        ){

            Android.setVolume(
                parseFloat(
                    volumeSlider.value
                )
            );
        }
    }
);

// =========================
// FULLSCREEN
// =========================

fullscreenBtn.addEventListener(
    'click',
    async () => {

        const player =
            document.querySelector(
                '.player'
            );

        if(
            !document
                .fullscreenElement
        ){

            await player
                .requestFullscreen();

            if(
                screen.orientation &&
                screen.orientation.lock
            ){

                screen.orientation
                    .lock(
                        'landscape'
                    )
                    .catch(() => {});
            }

            // ANDROID NATIVE FULLSCREEN

            if(
                window.Android &&
                Android.enterFullscreen
            ){

                Android.enterFullscreen();
            }

        }else{

            document
                .exitFullscreen();

            if(
                screen.orientation &&
                screen.orientation.unlock
            ){

                screen.orientation
                    .unlock();
            }

            if(
                window.Android &&
                Android.exitFullscreen
            ){

                Android.exitFullscreen();
            }
        }
    }
);

// =========================
// PAGE EVENTS
// =========================

document.addEventListener(
    'visibilitychange',
    () => {

        if(
            window.Android &&
            Android.resumePlayback
        ){

            Android.resumePlayback();
        }
    }
);

// =========================
// AUTO START
// =========================

playNativeStream();

</script>

</body>
</html>
