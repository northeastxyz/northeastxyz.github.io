<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced HTML5 Player</title>
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: sans-serif; }
        .container { width: 80%; max-width: 800px; text-align: center; }
        video { width: 100%; background: #111; }
        #log { color: #ffbc00; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <video id="videoElement" controls autoplay muted playsinline></video>
    <div id="log">Memulai inisialisasi stream...</div>
</div>

<script>
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    document.addEventListener("DOMContentLoaded", function() {
        const videoElement = document.getElementById('videoElement');
        const logDiv = document.getElementById('log');
        const streamUrl = getQueryParam('url');

        if (!streamUrl) {
            logDiv.innerText = "Error: Parameter URL tidak ditemukan.";
            return;
        }

        logDiv.innerText = "Mencoba memutar via FLV.js...";

        if (flvjs.isSupported()) {
            // Konfigurasi flv.js yang lebih agresif untuk Live Stream
            const flvPlayer = flvjs.createPlayer({
                type: 'flv',
                url: streamUrl,
                isLive: true,
                hasAudio: true,
                hasVideo: true,
                enableStashBuffer: false // Mengurangi delay & loading mandek pada live stream
            }, {
                enableWorker: true,
                stashInitialSize: 128
            });
            
            flvPlayer.attachMediaElement(videoElement);
            flvPlayer.load();
            
            flvPlayer.play().catch(e => {
                logDiv.innerText = "Autoplay diblokir browser, klik PLAY pada video.";
            });

            flvPlayer.on(flvjs.Events.ERROR, function(type, detail, info) {
                console.log("FLV Error:", type, detail, info);
                logDiv.innerText = "FLV gagal. Mencoba beralih ke HLS format...";
                tryHls(streamUrl, videoElement, logDiv);
            });
        } else {
            tryHls(streamUrl, videoElement, logDiv);
        }
    });

    function tryHls(url, videoElement, logDiv) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMediaElement(videoElement);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                logDiv.innerText = "Memutar via HLS.js";
                videoElement.play();
            });
            hls.on(Hls.Events.ERROR, function(event, data) {
                logDiv.innerText = "Semua metode pemutaran gagal. Coba cek Tab Console (F12) untuk melihat error CORS.";
            });
        } else {
            logDiv.innerText = "Browser tidak mendukung FLV maupun HLS.";
        }
    }
</script>
</body>
</html>
