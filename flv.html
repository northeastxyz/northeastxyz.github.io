<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug & Play FLV</title>
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: monospace; padding: 20px; }
        .player-box { max-width: 800px; margin: 0 auto; }
        video { width: 100%; background: #000; margin-bottom: 15px; }
        #status-log { background: #222; padding: 15px; border-left: 4px solid #00f3ff; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

<div class="player-box">
    <video id="videoPlayer" controls autoplay muted></video>
    <h3>Status & Debug Log:</h3>
    <div id="status-log">Mengambil data dari API...</div>
</div>

<script>
    const logBox = document.getElementById('status-log');
    const videoElement = document.getElementById('videoPlayer');

    function log(msg) {
        logBox.innerText += "\n> " + msg;
    }

    function getQueryParam(param) {
        return new URLSearchParams(window.location.search).get(param);
    }

    async function initPlayer() {
        const apiUrl = getQueryParam('url');
        if (!apiUrl) {
            log("Error: Parameter ?url= tidak ditemukan!");
            return;
        }

        log("Menghubungi API: " + apiUrl);

        try {
            // 1. Ambil respon dari API terlebih dahulu untuk melihat isinya
            const response = await fetch(apiUrl);
            
            // Cek jika response berupa JSON atau teks biasa (bukan stream langsung)
            const contentType = response.headers.get("content-type") || "";
            log("Content-Type Terdeteksi: " + contentType);

            let finalStreamUrl = apiUrl;

            if (contentType.includes("application/json")) {
                const jsonData = await response.json();
                log("API mengembalikan JSON! Mengurai data...");
                console.log("Isi JSON:", jsonData);
                
                // === SESUAIKAN DI SINI ===
                // Contoh jika JSON berbentuk: { "data": "http://...flv" } atau { "url": "http://...flv" }
                finalStreamUrl = jsonData.url || jsonData.data || jsonData.stream || null;
                
                if (!finalStreamUrl) {
                    log("Gagal menemukan key 'url' atau 'data' di dalam JSON. Struktur JSON tercatat di Console (F12).");
                    return;
                }
                log("Link asli ditemukan dalam JSON: " + finalStreamUrl);
            }

            // 2. Jalankan FLV Player dengan URL final
            if (flvjs.isSupported()) {
                log("Memulai FLV.js untuk: " + finalStreamUrl);
                const flvPlayer = flvjs.createPlayer({
                    type: 'flv',
                    url: finalStreamUrl,
                    isLive: true
                }, {
                    enableStashBuffer: false,
                    cors: true
                });

                flvPlayer.attachMediaElement(videoElement);
                flvPlayer.load();
                flvPlayer.play().then(() => {
                    log("Video berhasil diputar!");
                }).catch(e => {
                    log("Autoplay ditahan browser. Silakan klik tombol Play manual.");
                });

                flvPlayer.on(flvjs.Events.ERROR, (errType, errDetail) => {
                    log(`FLV Player Error: ${errType} - ${errDetail}`);
                });
            }

        } catch (error) {
            log("Gagal mengambil data dari API. Kemungkinan besar diblokir oleh CORS.");
            log("Pesan Error: " + error.message);
            log("SOLUSI: Buka tab 'Console' (klik tanda silang merah di pojok kanan atas) untuk detail error lengkap.");
        }
    }

    document.addEventListener("DOMContentLoaded", initPlayer);
</script>
</body>
</html>
