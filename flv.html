<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>Professional FLV Live Player</title>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;

    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
}

.player{
    width:100%;
    height:100%;
    position:relative;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

/* =========================
MINIMAL CONTROLS
========================= */

.controls{
    position:absolute;
    left:12px;
    bottom:12px;
    z-index:50;
}

.panel{
    background:rgba(0,0,0,.30);

    backdrop-filter:blur(10px);

    border-radius:12px;

    padding:8px 10px;

    width:370px;

    border:1px solid rgba(255,255,255,.04);
}

.liveText{
    display:flex;

    align-items:center;

    gap:5px;

    font-size:10px;

    color:white;

    margin-bottom:6px;
}

.liveDot{
    width:6px;
    height:6px;

    background:red;

    border-radius:50%;
}

.row{
    display:flex;

    align-items:center;

    gap:8px;
}

button{
    border:none;

    outline:none;

    background:#151515;

    color:white;

    border-radius:8px;

    padding:6px 10px;

    font-size:11px;

    cursor:pointer;

    transition:.2s;
}

button:hover{
    background:#202020;
}

.volumeWrap{
    display:flex;

    align-items:center;

    gap:6px;

    flex:1;
}

.volumeIcon{
    font-size:14px;

    color:white;
}

#volumeSlider{
    flex:1;

    height:2px;

    cursor:pointer;

    accent-color:white;
}

.stats{
    margin-top:5px;

    font-size:10px;

    color:#a0a0a0;
}

.error{
    margin-top:4px;

    font-size:10px;

    color:#ff6b6b;

    display:none;
}

/* =========================
FULLSCREEN
========================= */

.fullscreen{
    position:absolute;

    right:14px;
    bottom:14px;

    width:42px;
    height:42px;

    border:none;

    border-radius:12px;

    background:rgba(0,0,0,.35);

    backdrop-filter:blur(10px);

    color:white;

    font-size:14px;

    cursor:pointer;

    z-index:60;
}

/* =========================
LOADER
========================= */

.loader{
    position:absolute;

    inset:0;

    background:rgba(0,0,0,.4);

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:40;
}

.spinner{
    width:50px;
    height:50px;

    border-radius:50%;

    border:3px solid rgba(255,255,255,.15);

    border-top-color:white;

    animation:spin .8s linear infinite;
}

@keyframes spin{

    to{
        transform:rotate(360deg);
    }
}

.hidden{
    display:none !important;
}

/* =========================
EMPTY
========================= */

.empty{
    position:absolute;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    color:white;

    z-index:30;

    text-align:center;
}

.empty h1{
    font-size:20px;

    margin-bottom:10px;
}

.empty p{
    font-size:13px;

    color:#999;
}

@media(max-width:700px){

    .panel{
        width:300px;
    }

    button{
        font-size:10px;
    }
}

</style>

</head>

<body>

<div class="player">

    <video
        id="video"
        controls
        autoplay
        playsinline
        webkit-playsinline
        x5-playsinline>
    </video>

    <!-- EMPTY -->

    <div
        class="empty"
        id="emptyBox">

        <h1>
            No Stream URL
        </h1>

        <p>
            flv.html?url=https://example.com/live.flv
        </p>

    </div>

    <!-- LOADER -->

    <div
        class="loader hidden"
        id="loader">

        <div class="spinner"></div>

    </div>

    <!-- FULLSCREEN -->

    <button
        class="fullscreen"
        id="fullscreenBtn">

        ⛶

    </button>

    <!-- CONTROLS -->

    <div class="controls">

        <div class="panel">

            <div class="liveText">

                <div class="liveDot"></div>

                LIVE

            </div>

            <div class="row">

                <button id="reloadBtn">

                    Reload Stream

                </button>

                <div class="volumeWrap">

                    <div class="volumeIcon">

                        🔊

                    </div>

                    <input
                        type="range"
                        id="volumeSlider"
                        min="0"
                        max="1"
                        step="0.01"
                        value="1"
                    >

                </div>

            </div>

            <div
                class="error"
                id="errorBox">

                Stream disconnected...

            </div>

            <div
                class="stats"
                id="stats">

                Waiting stream...

            </div>

        </div>

    </div>

</div>

<script>

// =========================
// FORCE ANDROID USER AGENT
// =========================

Object.defineProperty(
    navigator,
    'userAgent',
    {
        get: function () {

            return 'Mozilla/5.0 (Linux; Android 13; SM-G991B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36';
        }
    }
);

// =========================
// FAKE MOBILE DEVICE
// =========================

Object.defineProperty(
    navigator,
    'platform',
    {
        get: function () {

            return 'Android';
        }
    }
);

Object.defineProperty(
    navigator,
    'maxTouchPoints',
    {
        get: function () {

            return 5;
        }
    }
);

// =========================
// ELEMENT
// =========================

const video =
    document.getElementById('video');

const loader =
    document.getElementById('loader');

const errorBox =
    document.getElementById('errorBox');

const fullscreenBtn =
    document.getElementById('fullscreenBtn');

const reloadBtn =
    document.getElementById('reloadBtn');

const statsBox =
    document.getElementById('stats');

const emptyBox =
    document.getElementById('emptyBox');

const volumeSlider =
    document.getElementById('volumeSlider');

// =========================
// PLAYER STATE
// =========================

let player = null;

let reconnectTimer = null;

let reconnectCount = 0;

// =========================
// GET STREAM URL
// =========================

function getRawUrl(){

    const href =
        window.location.href;

    const index =
        href.indexOf('?url=');

    if(index === -1){

        return null;
    }

    return href.substring(
        index + 5
    );
}

const rawUrl =
    getRawUrl();

let currentUrl = null;

if(
    rawUrl &&
    rawUrl.trim() !== ''
){

    currentUrl =
        decodeURIComponent(rawUrl);
}

// =========================
// LOADER
// =========================

function showLoader(){

    loader.classList.remove('hidden');
}

function hideLoader(){

    loader.classList.add('hidden');
}

// =========================
// DESTROY PLAYER
// =========================

function destroyPlayer(){

    try{

        if(player){

            player.pause();

            player.unload();

            player.detachMediaElement();

            player.destroy();

            player = null;
        }

    }catch(err){

        console.warn(err);
    }
}

// =========================
// RECONNECT
// =========================

function reconnect(){

    if(!currentUrl){

        return;
    }

    destroyPlayer();

    errorBox.style.display =
        'block';

    const delay = Math.min(
        10000,
        1000 * (
            2 ** reconnectCount
        )
    );

    reconnectCount++;

    clearTimeout(
        reconnectTimer
    );

    reconnectTimer =
        setTimeout(() => {

            startPlayer();

        }, delay);
}

// =========================
// START PLAYER
// =========================

function startPlayer(){

    if(!currentUrl){

        emptyBox.style.display =
            'flex';

        return;
    }

    emptyBox.style.display =
        'none';

    destroyPlayer();

    showLoader();

    errorBox.style.display =
        'none';

    if(
        typeof mpegts ===
        'undefined'
    ){

        return;
    }

    if(
        !mpegts
            .getFeatureList()
            .mseLivePlayback
    ){

        return;
    }

    player =
        mpegts.createPlayer({

            type:'flv',

            isLive:true,

            url:currentUrl

        },{

            enableWorker:true,

            lazyLoad:false,

            liveBufferLatencyChasing:true,

            liveSync:true,

            autoCleanupSourceBuffer:true
        });

    player.attachMediaElement(
        video
    );

    player.load();

    // AUDIO

    video.muted = false;

    video.volume =
        volumeSlider.value;

    video.play()
    .catch(() => {

        document.body.addEventListener(
            'click',
            () => {

                video.play();

            },
            { once:true }
        );
    });

    // ERROR

    player.on(
        mpegts.Events.ERROR,
        () => {

            reconnect();
        }
    );

    // STATS

    player.on(
        mpegts.Events
            .STATISTICS_INFO,

        (stats) => {

            statsBox.innerHTML = `
                Speed:
                ${stats.speed} KB/s
                |
                ${stats.loaderType}
            `;
        }
    );
}

// =========================
// VIDEO EVENTS
// =========================

video.addEventListener(
    'playing',
    () => {

        hideLoader();

        reconnectCount = 0;

        errorBox.style.display =
            'none';
    }
);

video.addEventListener(
    'waiting',
    () => {

        showLoader();
    }
);

video.addEventListener(
    'stalled',
    reconnect
);

video.addEventListener(
    'error',
    reconnect
);

// =========================
// RELOAD
// =========================

reloadBtn.addEventListener(
    'click',
    () => {

        reconnectCount = 0;

        startPlayer();
    }
);

// =========================
// VOLUME
// =========================

volumeSlider.addEventListener(
    'input',
    () => {

        video.volume =
            volumeSlider.value;

        video.muted =
            volumeSlider.value == 0;
    }
);

// =========================
// FULLSCREEN
// =========================

fullscreenBtn.addEventListener(
    'click',
    () => {

        if(
            !document
                .fullscreenElement
        ){

            document
                .querySelector(
                    '.player'
                )
                .requestFullscreen();

        }else{

            document
                .exitFullscreen();
        }
    }
);

// =========================
// KEEP PLAYING BACKGROUND
// =========================

document.addEventListener(
    'visibilitychange',
    () => {

        if(
            currentUrl
        ){

            video.play()
            .catch(() => {});
        }
    }
);

// =========================
// AUTO START
// =========================

startPlayer();

</script>

</body>
</html>
