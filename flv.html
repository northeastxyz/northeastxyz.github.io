<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern HTML5 FLV Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mpegts.js/1.7.3/mpegts.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1c1c1c;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            width: 80%;
            max-width: 800px;
            background: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
        .error-msg {
            color: #ff4a4a;
            padding: 20px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="videoElement" controls autoplay muted></video>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script>
        // 1. Fungsi untuk mengambil parameter 'url' dari query string URL
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        document.addEventListener("DOMContentLoaded", function() {
            const videoElement = document.getElementById('videoElement');
            const errorMsg = document.getElementById('errorMsg');
            
            // Ambil link FLV dari parameter ?url=
            const flvUrl = getQueryParam('url');

            if (!flvUrl) {
                errorMsg.innerText = "Error: Parameter URL tidak ditemukan. Contoh penggunaan: flv.html?url=http://contoh.com/video.flv";
                errorMsg.style.display = "block";
                videoElement.style.display = "none";
                return;
            }

            // 2. Cek apakah mpegts.js didukung oleh browser
            if (mpegts.getFeatureList().mseSourceBufferSupported) {
                // Inisialisasi player
                const player = mpegts.createPlayer({
                    type: 'flv',
                    url: flvUrl,
                    isLive: false // Ubah jadi true jika ini adalah Live Streaming (HTTP-FLV)
                });
                
                player.attachMediaElement(videoElement);
                player.load();
                
                // Handle error player
                player.on(mpegts.Events.ERROR, (type, detail, info) => {
                    console.error('Player Error:', type, detail, info);
                    errorMsg.innerText = `Gagal memutar video FLV. Terjadi kesalahan internal.`;
                    errorMsg.style.display = "block";
                });

            } else {
                errorMsg.innerText = "Browser Anda tidak mendukung Media Source Extensions (MSE) untuk memutar FLV.";
                errorMsg.style.display = "block";
            }
        });
    </script>
</body>
</html>
