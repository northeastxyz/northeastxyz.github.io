<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 FLV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: sans-serif;
        }
        .container {
            width: 80%;
            max-width: 800px;
            text-align: center;
        }
        video {
            width: 100%;
            background-color: #111;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #error-msg {
            color: #ff4d4d;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <video id="videoElement" controls autoplay muted></video>
    <div id="error-msg"></div>
</div>

<script>
    // 1. Fungsi untuk mengambil parameter 'url' dari query string
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    // 2. Jalankan player setelah halaman selesai dimuat
    document.addEventListener("DOMContentLoaded", function() {
        const videoElement = document.getElementById('videoElement');
        const errorMsg = document.getElementById('error-msg');
        
        // Ambil URL video FLV dari parameter ?url=
        const flvUrl = getQueryParam('url');

        if (!flvUrl) {
            errorMsg.innerText = "Error: Parameter URL FLV tidak ditemukan. Contoh penggunaan: flv.html?url=http://link-flv-kamu.flv";
            return;
        }

        // 3. Cek apakah browser mendukung flv.js
        if (flvjs.isSupported()) {
            const flvPlayer = flvjs.createPlayer({
                type: 'flv',
                url: flvUrl,
                isLive: true, // Ubah ke false jika ini file video rekaman (bukan live stream)
                cors: true    // Mengaktifkan CORS jika server video mendukungnya
            });
            
            flvPlayer.attachMediaElement(videoElement);
            flvPlayer.load();
            
            // Mencoba melakukan autoplay
            flvPlayer.play().catch(error => {
                console.log("Autoplay diblokir oleh browser, user harus klik play manual atau video harus di-mute.");
            });

            // Handle error jika streaming putus atau gagal dimuat
            flvPlayer.on(flvjs.Events.ERROR, function(errorType, errorDetails, errorInfo) {
                console.error('Flv.js Error:', errorType, errorDetails, errorInfo);
                errorMsg.innerText = "Gagal memutar FLV. Pastikan link aktif dan mendukung CORS.";
            });

        } else {
            errorMsg.innerText = "Browser Anda tidak mendukung MSE / flv.js.";
        }
    });
</script>

</body>
</html>
