<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>MPEGTS Direct Player</title>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}

</style>

</head>

<body>

<video
    id="video"
    controls
    autoplay
    muted
    preload="auto"
    playsinline
    webkit-playsinline>
</video>

<script>

// =========================
// ELEMENT
// =========================

const video =
    document.getElementById(
        'video'
    );

// =========================
// GET URL
// =========================

function getQueryParam(param){

    const params =
        new URLSearchParams(
            window.location.search
        );

    return params.get(param);
}

const currentUrl =
    getQueryParam('url');

// =========================
// PLAYER
// =========================

let player = null;

let reconnecting = false;

// =========================
// DESTROY
// =========================

function destroyPlayer(){

    try{

        if(player){

            player.pause();

            player.unload();

            player.detachMediaElement();

            player.destroy();

            player = null;
        }

    }catch(e){}
}

// =========================
// RECONNECT
// =========================

function reconnect(){

    if(
        reconnecting
    ){

        return;
    }

    reconnecting = true;

    destroyPlayer();

    setTimeout(() => {

        reconnecting = false;

        startPlayer();

    }, 5000);
}

// =========================
// START PLAYER
// =========================

async function startPlayer(){

    if(!currentUrl){

        console.log(
            'NO URL'
        );

        return;
    }

    if(
        !mpegts.isSupported()
    ){

        console.log(
            'MPEGTS NOT SUPPORTED'
        );

        return;
    }

    destroyPlayer();

    // =========================
    // FETCH TEST
    // =========================

    try{

        const response =
            await fetch(
                currentUrl,
                {

                    method:'GET',

                    mode:'cors',

                    redirect:'follow',

                    credentials:'omit',

                    headers:{

                        'Accept':'*/*',

                        'Origin':
                        location.origin,

                        'Referer':
                        location.href
                    }
                }
            );

        console.log(
            'HTTP STATUS:',
            response.status
        );

        console.log(
            'FINAL URL:',
            response.url
        );

        console.log(
            'CONTENT TYPE:',
            response.headers.get(
                'content-type'
            )
        );

    }catch(err){

        console.log(
            'FETCH ERROR:',
            err
        );
    }

    // =========================
    // PLAYER
    // =========================

    player =
        mpegts.createPlayer({

            type:'flv',

            url:currentUrl,

            isLive:true,

            cors:true

        },{

            enableWorker:false,

            lazyLoad:false,

            liveSync:false,

            liveBufferLatencyChasing:false,

            stashInitialSize:128,

            fixAudioTimestampGap:true,

            autoCleanupSourceBuffer:true,

            autoCleanupMaxBackwardDuration:30,

            autoCleanupMinBackwardDuration:15,

            withCredentials:false,

            seekType:'range',

            headers:{

                'Accept':'*/*',

                'Origin':
                location.origin,

                'Referer':
                location.href
            }
        });

    player.attachMediaElement(
        video
    );

    player.load();

    // =========================
    // AUTOPLAY
    // =========================

    const tryPlay = () => {

        video.play()
        .then(() => {

            setTimeout(() => {

                video.muted = false;

            }, 1000);

        })
        .catch(err => {

            console.log(
                'PLAY ERROR:',
                err
            );
        });
    };

    tryPlay();

    document.addEventListener(
        'touchstart',
        tryPlay,
        { once:true }
    );

    document.addEventListener(
        'click',
        tryPlay,
        { once:true }
    );

    // =========================
    // PLAYER EVENTS
    // =========================

    player.on(
        mpegts.Events.ERROR,
        (type, detail) => {

            console.log(
                'PLAYER ERROR:',
                type,
                detail
            );

            reconnect();
        }
    );
}

// =========================
// VIDEO EVENTS
// =========================

video.addEventListener(
    'stalled',
    reconnect
);

video.addEventListener(
    'error',
    reconnect
);

video.addEventListener(
    'waiting',
    () => {

        video.play()
        .catch(() => {});
    }
);

// =========================
// KEEP PLAYING
// =========================

document.addEventListener(
    'visibilitychange',
    () => {

        video.play()
        .catch(() => {});
    }
);

// =========================
// WATCHDOG
// =========================

setInterval(() => {

    if(
        video.readyState <= 1
    ){

        reconnect();
    }

}, 45000);

// =========================
// START
// =========================

startPlayer();

</script>

</body>
</html>
