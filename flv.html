<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>Professional FLV Live Player</title>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#050505;
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        sans-serif;
    overflow:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

.player{
    width:100%;
    height:100%;
    position:relative;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

/* =========================
BOTTOM PANEL
========================= */

.controls{
    position:absolute;
    left:24px;
    bottom:20px;
    z-index:50;
}

.panel{
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(14px);
    border-radius:18px;
    padding:14px 16px;
    color:white;
    border:1px solid rgba(255,255,255,.06);
    width:420px;
}

.liveText{
    font-size:13px;
    color:white;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:8px;
}

.liveDot{
    width:8px;
    height:8px;
    background:red;
    border-radius:50%;
}

.row{
    display:flex;
    align-items:center;
    gap:16px;
}

button{
    border:none;
    outline:none;
    background:#18181b;
    color:white;
    border-radius:12px;
    padding:10px 16px;
    font-size:14px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#232327;
}

.volumeWrap{
    display:flex;
    align-items:center;
    gap:10px;
    flex:1;
}

.volumeIcon{
    font-size:22px;
}

#volumeSlider{
    flex:1;
    cursor:pointer;
    accent-color:white;
}

.loader{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(3px);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:40;
}

.spinner{
    width:60px;
    height:60px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,.12);
    border-top-color:white;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.hidden{
    display:none !important;
}

.error{
    color:#ff5b5b;
    margin-top:10px;
    font-size:12px;
    display:none;
}

.fullscreen{
    position:absolute;
    right:22px;
    bottom:22px;
    width:52px;
    height:52px;
    border:none;
    border-radius:16px;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(10px);
    color:white;
    z-index:60;
    cursor:pointer;
    font-size:18px;
    border:1px solid rgba(255,255,255,.08);
}

.stats{
    margin-top:10px;
    font-size:12px;
    color:#b0b0b0;
}

.empty{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    z-index:30;
    text-align:center;
    padding:20px;
}

.empty h1{
    font-size:22px;
    margin-bottom:10px;
}

.empty p{
    font-size:14px;
    color:#999;
    line-height:1.6;
    word-break:break-all;
}

@media(max-width:700px){

    .controls{
        left:10px;
        bottom:10px;
    }

    .panel{
        width:320px;
        padding:12px;
    }

    .row{
        gap:10px;
    }

    button{
        padding:9px 12px;
        font-size:13px;
    }

    .fullscreen{
        right:12px;
        bottom:12px;
    }
}

</style>

</head>

<body>

<div class="player">

    <video
        id="video"
        controls
        autoplay
        playsinline
        webkit-playsinline
        x5-playsinline>
    </video>

    <!-- EMPTY -->
    <div
        class="empty"
        id="emptyBox">

        <h1>
            No Stream URL
        </h1>

        <p>
            Example:
            <br><br>

            flv.html?url=https://example.com/live.flv
        </p>

    </div>

    <!-- LOADER -->
    <div
        class="loader hidden"
        id="loader">

        <div class="spinner"></div>

    </div>

    <!-- FULLSCREEN -->
    <button
        class="fullscreen"
        id="fullscreenBtn">

        ⛶

    </button>

    <!-- CONTROLS -->
    <div class="controls">

        <div class="panel">

            <div class="liveText">

                <div class="liveDot"></div>

                LIVE

            </div>

            <div class="row">

                <button id="reloadBtn">
                    Reload Stream
                </button>

                <div class="volumeWrap">

                    <div class="volumeIcon">
                        🔊
                    </div>

                    <input
                        type="range"
                        id="volumeSlider"
                        min="0"
                        max="1"
                        step="0.01"
                        value="1"
                    >

                </div>

            </div>

            <div
                class="error"
                id="errorBox">

                Stream disconnected.
                Reconnecting...

            </div>

            <div
                class="stats"
                id="stats">

                Waiting stream...

            </div>

        </div>

    </div>

</div>

<script>

// =========================
// ELEMENT
// =========================

const video =
    document.getElementById('video');

const loader =
    document.getElementById('loader');

const errorBox =
    document.getElementById('errorBox');

const fullscreenBtn =
    document.getElementById('fullscreenBtn');

const reloadBtn =
    document.getElementById('reloadBtn');

const statsBox =
    document.getElementById('stats');

const emptyBox =
    document.getElementById('emptyBox');

const volumeSlider =
    document.getElementById('volumeSlider');

// =========================
// PLAYER STATE
// =========================

let player = null;

let reconnectTimer = null;

let watchdogTimer = null;

let reconnectCount = 0;

// =========================
// GET FULL URL PARAM
// =========================

function getRawUrl(){

    const href =
        window.location.href;

    const index =
        href.indexOf('?url=');

    if(index === -1){

        return null;
    }

    return href.substring(
        index + 5
    );
}

const rawUrl =
    getRawUrl();

let currentUrl = null;

// =========================
// VALIDATE URL
// =========================

if(
    rawUrl &&
    rawUrl.trim() !== ''
){

    currentUrl =
        decodeURIComponent(rawUrl);

}else{

    currentUrl = null;
}

// =========================
// LOADER
// =========================

function showLoader(){

    loader.classList.remove('hidden');
}

function hideLoader(){

    loader.classList.add('hidden');
}

// =========================
// DESTROY PLAYER
// =========================

function destroyPlayer(){

    try{

        if(player){

            player.pause();

            player.unload();

            player.detachMediaElement();

            player.destroy();

            player = null;
        }

    }catch(err){

        console.warn(err);
    }
}

// =========================
// WATCHDOG
// =========================

function resetWatchdog(){

    clearTimeout(
        watchdogTimer
    );

    watchdogTimer =
        setTimeout(() => {

            reconnect();

        }, 15000);
}

// =========================
// RECONNECT
// =========================

function reconnect(){

    if(!currentUrl){

        return;
    }

    destroyPlayer();

    errorBox.style.display =
        'block';

    const delay = Math.min(
        15000,
        1000 * (
            2 ** reconnectCount
        )
    );

    reconnectCount++;

    clearTimeout(
        reconnectTimer
    );

    reconnectTimer =
        setTimeout(() => {

            startPlayer();

        }, delay);
}

// =========================
// START PLAYER
// =========================

function startPlayer(){

    if(!currentUrl){

        destroyPlayer();

        hideLoader();

        emptyBox.style.display =
            'flex';

        statsBox.innerHTML =
            'Waiting stream...';

        errorBox.style.display =
            'none';

        return;
    }

    emptyBox.style.display =
        'none';

    destroyPlayer();

    showLoader();

    errorBox.style.display =
        'none';

    if(
        typeof mpegts ===
        'undefined'
    ){

        return;
    }

    if(
        !mpegts
            .getFeatureList()
            .mseLivePlayback
    ){

        return;
    }

    player =
        mpegts.createPlayer({

            type:'flv',

            isLive:true,

            url:currentUrl

        },{

            enableWorker:true,

            lazyLoad:false,

            deferLoadAfterSourceOpen:false,

            liveBufferLatencyChasing:true,

            liveSync:true,

            autoCleanupSourceBuffer:true,

            autoCleanupMaxBackwardDuration:30,

            autoCleanupMinBackwardDuration:10,

            stashInitialSize:64,

            fixAudioTimestampGap:false
        });

    player.attachMediaElement(
        video
    );

    player.load();

    // AUDIO

    video.muted = false;

    video.volume =
        volumeSlider.value;

    video.play()
    .catch(() => {

        document.body.addEventListener(
            'click',
            () => {

                video.play();

            },
            { once:true }
        );
    });

    // ERROR

    player.on(
        mpegts.Events.ERROR,
        () => {

            reconnect();
        }
    );

    // STATS

    player.on(
        mpegts.Events
            .STATISTICS_INFO,

        (stats) => {

            statsBox.innerHTML = `
                Speed:
                ${stats.speed} KB/s
                |
                Loader:
                ${stats.loaderType}
            `;
        }
    );
}

// =========================
// VIDEO EVENTS
// =========================

video.addEventListener(
    'playing',
    () => {

        hideLoader();

        reconnectCount = 0;

        errorBox.style.display =
            'none';

        resetWatchdog();
    }
);

video.addEventListener(
    'waiting',
    () => {

        showLoader();
    }
);

video.addEventListener(
    'timeupdate',
    () => {

        resetWatchdog();
    }
);

video.addEventListener(
    'stalled',
    reconnect
);

video.addEventListener(
    'error',
    reconnect
);

// =========================
// RELOAD
// =========================

reloadBtn.addEventListener(
    'click',
    () => {

        reconnectCount = 0;

        startPlayer();
    }
);

// =========================
// VOLUME
// =========================

volumeSlider.addEventListener(
    'input',
    () => {

        video.volume =
            volumeSlider.value;

        if(
            volumeSlider.value == 0
        ){

            video.muted = true;

        }else{

            video.muted = false;
        }
    }
);

// =========================
// FULLSCREEN
// =========================

fullscreenBtn.addEventListener(
    'click',
    () => {

        if(
            !document
                .fullscreenElement
        ){

            document
                .querySelector(
                    '.player'
                )
                .requestFullscreen();

        }else{

            document
                .exitFullscreen();
        }
    }
);

// =========================
// ONLINE/OFFLINE
// =========================

window.addEventListener(
    'online',
    () => {

        reconnectCount = 0;

        startPlayer();
    }
);

// =========================
// TAB VISIBILITY
// =========================

document.addEventListener(
    'visibilitychange',
    () => {

        if(
            !document.hidden &&
            currentUrl
        ){

            reconnectCount = 0;

            startPlayer();
        }
    }
);

// =========================
// AUTO START
// =========================

startPlayer();

</script>

</body>
</html>
