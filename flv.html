<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>FLV Player</title>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:system-ui,sans-serif;
}

#app{
    width:100%;
    height:100%;
    position:relative;
    background:#000;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}

#status{
    position:absolute;
    top:10px;
    left:10px;
    z-index:99999;

    padding:6px 10px;

    border-radius:999px;

    background:rgba(0,0,0,.6);
    color:#fff;

    font-size:12px;
}

#loading{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    color:#fff;
    font-size:14px;

    z-index:9999;
}

#stats{
    display:none;

    position:absolute;
    top:12px;
    left:12px;

    z-index:99999;

    padding:4px 10px;

    border-radius:999px;

    background:rgba(0,0,0,.45);
    backdrop-filter:blur(6px);

    color:#fff;

    font-size:12px;
    font-weight:500;

    pointer-events:none;
    user-select:none;
}
</style>
</head>

<body>

<div id="app">

    <div id="status">
        INITIALIZING...
    </div>

    <div id="loading">
        Loading Stream...
    </div>

    <div id="stats">
        --fps • --MB/s • --p
    </div>

    <video
        id="video"
        controls
        autoplay
        playsinline
        webkit-playsinline>
    </video>

</div>

<script>

const video = document.getElementById('video');
const statusBox = document.getElementById('status');
const loadingBox = document.getElementById('loading');
const statsBox = document.getElementById('stats');

function getQuery(name){
    return new URLSearchParams(location.search).get(name);
}

const streamURL = getQuery('url');

let player = null;
let currentSpeed = 0;
let lastDecodedFrames = 0;

function setStatus(text){
    statusBox.textContent = text;
}

function showLoading(show){
    loadingBox.style.display = show ? 'block' : 'none';
}

function destroyPlayer(){

    try{

        if(player){

            player.pause();
            player.unload();
            player.detachMediaElement();
            player.destroy();

            player = null;
        }

    }catch(e){
        console.log(e);
    }
}

async function startPlayer(){

    if(!streamURL){

        setStatus('NO STREAM URL');
        return;
    }

    if(!mpegts.getFeatureList().mseLivePlayback){

        setStatus('MSE NOT SUPPORTED');
        return;
    }

    destroyPlayer();

    setStatus('CONNECTING...');
    showLoading(true);

    player = mpegts.createPlayer({

        type:'flv',
        url:streamURL,
        isLive:true,
        cors:true,
        hasAudio:true,
        hasVideo:true

    },{
        enableWorker:false,
        enableStashBuffer:false,
        lazyLoad:false,
        liveSync:false
    });

    player.attachMediaElement(video);
    player.load();

    player.on(
        mpegts.Events.STATISTICS_INFO,
        stat => {

            if(stat.speed){

                currentSpeed = stat.speed;
            }
        }
    );

    try{

        await video.play();

        setStatus('PLAYING');
        showLoading(false);

    }catch(err){

        setStatus('CLICK TO PLAY');
        showLoading(false);
    }
}

function forcePlay(){

    if(video.paused){

        video.play()
        .then(()=>{

            video.muted = false;
            setStatus('PLAYING');

        })
        .catch(()=>{});
    }
}

document.addEventListener('click', forcePlay);
document.addEventListener('touchstart', forcePlay);

document.addEventListener('visibilitychange', ()=>{

    if(!document.hidden){

        video.play().catch(()=>{});
    }
});

function updateFullscreenState(){

    const isFullscreen =
        document.fullscreenElement ||
        document.webkitFullscreenElement;

    statsBox.style.display =
        isFullscreen ? 'block' : 'none';
}

document.addEventListener(
    'fullscreenchange',
    updateFullscreenState
);

document.addEventListener(
    'webkitfullscreenchange',
    updateFullscreenState
);

setInterval(()=>{

    let fps = 0;

    if(video.getVideoPlaybackQuality){

        const quality =
            video.getVideoPlaybackQuality();

        const totalFrames =
            quality.totalVideoFrames || 0;

        fps =
            totalFrames - lastDecodedFrames;

        lastDecodedFrames =
            totalFrames;
    }

    let speedText = '--';

    if(currentSpeed){

        const mb =
            currentSpeed / 1024 / 1024;

        speedText =
            mb.toFixed(1) + 'MB/s';
    }

    const resolution =
        video.videoHeight
        ? video.videoHeight + 'p'
        : '--p';

    statsBox.textContent =
        `${fps}fps • ${speedText} • ${resolution}`;

},1000);

startPlayer();

</script>

</body>
</html>
