<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>Player</title>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:system-ui,sans-serif;
}

/* Menggunakan Flexbox baris untuk memisahkan kolom Stats dan Video */
#app{
    width:100%;
    height:100%;
    display: flex;
    flex-direction: row;
    position:relative;
    background:#000;
}

/* Container khusus video agar flexbox bekerja rapi */
.video-container {
    flex: 1;
    height: 100%;
    position: relative;
    background: #000;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}

#status{
    position:absolute;
    top:10px;
    left:10px;
    z-index:9999;

    padding:6px 10px;

    border-radius:999px;

    background:rgba(0,0,0,.6);

    color:#fff;
    font-size:12px;
}

#loading{
    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    color:#fff;

    z-index:9999;
}

/* Default Mode: Ditaruh di pojok kiri luar video (sebagai kolom kiri) */
#stats{
    display: block; /* Selalu tampil secara default */
    width: auto;
    min-width: 130px;
    height: 100%;
    
    background: #111; /* Background panel kiri */
    border-right: 1px solid #222;
    color: #fff;

    font-size: 12px;
    font-weight: 500;
    
    /* Mengatur teks stats berderet ke bawah di panel kiri */
    padding: 20px 15px;
    white-space: pre-line; 
    line-height: 2;

    pointer-events: none;
    user-select: none;
    z-index: 999999;
}

#fullscreenBtn{
    position:absolute;

    right:15px;
    bottom:15px;

    width:42px;
    height:42px;

    border:none;

    border-radius:50%;

    background:rgba(0,0,0,.55);

    color:#fff;

    font-size:18px;

    cursor:pointer;

    z-index:999999;
}

#fullscreenBtn:active{
    transform:scale(.95);
}

#app:fullscreen,
#app:-webkit-full-screen{
    width:100vw;
    height:100vh;
}

/* Ketika Fullscreen: Paksa stats mengapung di dalam video */
#app:fullscreen #stats,
#app:-webkit-full-screen #stats {
    position: absolute;
    left: 12px;
    bottom: 60px;
    height: auto;
    width: auto;
    min-width: 0;
    background: rgba(0,0,0,.45);
    backdrop-filter: blur(6px);
    border-right: none;
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
}

#app:fullscreen video,
#app:-webkit-full-screen video{
    width:100%;
    height:100%;
    object-fit:contain;
}

video::-webkit-media-controls-fullscreen-button{
    display:none !important;
}
</style>
</head>

<body>

<div id="app">

    <div id="stats">
        --fps
        --MB/s
        --p
    </div>

    <div class="video-container">
        <div id="status">
            INITIALIZING...
        </div>

        <div id="loading">
            Loading Stream...
        </div>

        <button id="fullscreenBtn">
            ⛶
        </button>

        <video
            id="video"
            controls
            autoplay
            playsinline
            webkit-playsinline>
        </video>
    </div>

</div>

<script>

const app = document.getElementById('app');
const video = document.getElementById('video');

const statusBox = document.getElementById('status');
const loadingBox = document.getElementById('loading');
const statsBox = document.getElementById('stats');
const fullscreenBtn = document.getElementById('fullscreenBtn');

function getQuery(name){
    return new URLSearchParams(location.search).get(name);
}

const streamURL = getQuery('url');

let player = null;
let currentSpeed = 0;
let lastDecodedFrames = 0;

function setStatus(text){
    statusBox.textContent = text;
}

function showLoading(show){
    loadingBox.style.display =
        show ? 'block' : 'none';
}

function destroyPlayer(){

    try{

        if(player){

            player.pause();
            player.unload();
            player.detachMediaElement();
            player.destroy();

            player = null;
        }

    }catch(err){

        console.log(err);

    }
}

async function startPlayer(){

    if(!streamURL){

        setStatus('NO STREAM URL');
        return;
    }

    if(!mpegts.getFeatureList().mseLivePlayback){

        setStatus('MSE NOT SUPPORTED');
        return;
    }

    destroyPlayer();

    setStatus('CONNECTING...');
    showLoading(true);

    player = mpegts.createPlayer({

        type:'flv',
        url:streamURL,

        isLive:true,

        cors:true,

        hasAudio:true,
        hasVideo:true

    },{
        enableWorker:false,
        enableStashBuffer:false,
        lazyLoad:false,
        liveSync:false
    });

    player.attachMediaElement(video);

    player.load();

    player.on(
        mpegts.Events.STATISTICS_INFO,
        stat => {

            if(stat.speed){

                currentSpeed = stat.speed;
            }

        }
    );

    try{

        await video.play();

        setStatus('PLAYING');
        showLoading(false);

    }catch(err){

        setStatus('CLICK TO PLAY');
        showLoading(false);

    }
}

function forcePlay(){

    if(video.paused){

        video.play()
        .then(()=>{

            video.muted = false;

            setStatus('PLAYING');

        })
        .catch(()=>{});
    }
}

document.addEventListener('click', forcePlay);
document.addEventListener('touchstart', forcePlay);

document.addEventListener(
    'visibilitychange',
    ()=>{

        if(!document.hidden){

            video.play().catch(()=>{});

        }

    }
);

async function toggleFullscreen(){

    try{

        if(!document.fullscreenElement){

            await app.requestFullscreen();

            if(screen.orientation?.lock){

                try{
                    await screen.orientation.lock('landscape');
                }catch(e){}
            }

        }else{

            if(screen.orientation?.unlock){

                try{
                    screen.orientation.unlock();
                }catch(e){}
            }

            await document.exitFullscreen();
        }

    }catch(err){

        console.log(err);

    }
}

fullscreenBtn.addEventListener(
    'click',
    toggleFullscreen
);

video.addEventListener(
    'dblclick',
    toggleFullscreen
);

function updateFullscreenState() {
    const isFullscreen = document.fullscreenElement === app;
    fullscreenBtn.textContent = isFullscreen ? '✕' : '⛶';
}

document.addEventListener(
    'fullscreenchange',
    updateFullscreenState
);

setInterval(()=>{

    let fps = 0;

    if(video.getVideoPlaybackQuality){

        const quality =
            video.getVideoPlaybackQuality();

        const totalFrames =
            quality.totalVideoFrames || 0;

        fps =
            totalFrames - lastDecodedFrames;

        lastDecodedFrames =
            totalFrames;
    }

    let speedText = '--';

    if(currentSpeed){

        const mb =
            currentSpeed / 1024 / 1024;

        speedText =
            mb.toFixed(1) + 'MB/s';
    }

    const resolution =
        video.videoHeight
        ? video.videoHeight + 'p'
        : '--p';

    // Logika pemisah teks berdasarkan status fullscreen
    const isFullscreen = document.fullscreenElement === app;
    if (isFullscreen) {
        statsBox.textContent = `${fps}fps • ${speedText} • ${resolution}`;
    } else {
        statsBox.textContent = `FPS: ${fps}\nSpeed: ${speedText}\nRes: ${resolution}`;
    }

},1000);

startPlayer();

</script>

</body>
</html>
