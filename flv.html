<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huya Live Player (MPEG-TS)</title>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: sans-serif; }
        .container { width: 100%; max-width: 850px; text-align: center; padding: 10px; }
        video { width: 100%; background-color: #111; border-radius: 8px; }
        #status { margin-top: 15px; color: #00ffcc; font-size: 14px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <video id="videoElement" controls autoplay muted playsinline></video>
    <div id="status">Membuka stream dengan mpegts.js...</div>
</div>

<script>
    function getQueryParam(param) {
        return new URLSearchParams(window.location.search).get(param);
    }

    document.addEventListener("DOMContentLoaded", function() {
        const videoElement = document.getElementById('videoElement');
        const statusDiv = document.getElementById('status');
        const streamUrl = getQueryParam('url');

        if (!streamUrl) {
            statusDiv.innerHTML = "<span style='color:red;'>Error: URL Kosong!</span>";
            return;
        }

        if (mpegts.getFeatureList().mseLivePlayback) {
            statusDiv.innerText = "Menghubungkan ke stream...";

            // Menggunakan mpegts untuk auto-detect format flv/ts
            const player = mpegts.createPlayer({
                type: 'mse', // Menggunakan 'mse' agar otomatis mendeteksi apakah ini FLV atau TS
                url: streamUrl,
                isLive: true
            }, {
                enableWorker: true,
                enableStashBuffer: false, // Langsung render data tanpa antrean buffer
                stashInitialSize: 128,
                liveBufferLatencyChasing: true // Kejar delay live stream jika sempat tertinggal
            });

            player.attachMediaElement(videoElement);
            player.load();

            player.play().then(() => {
                statusDiv.innerText = "Streaming Aktif! (Unmute suara manual via ikon speaker)";
            }).catch(err => {
                statusDiv.innerText = "Klik Play pada video untuk memulai.";
            });

            player.on(mpegts.Events.ERROR, function(errorType, errorDetails, errorInfo) {
                console.error("Detail Error:", errorType, errorDetails, errorInfo);
                statusDiv.innerHTML = "<span style='color:#ff4d4d;'>Gagal memutar stream. Cek Console log.</span>";
            });
        } else {
            statusDiv.innerText = "Browser tidak mendukung mpegts.js (MSE).";
        }
    });
</script>

</body>
</html>
