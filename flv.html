<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huya Live Stream Player</title>
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: sans-serif; }
        .container { width: 100%; max-width: 850px; text-align: center; padding: 10px; }
        video { width: 100%; background-color: #111; border-radius: 8px; }
        #status { margin-top: 15px; color: #00ffcc; font-size: 14px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <video id="videoElement" controls autoplay muted playsinline></video>
    <div id="status">Menginisialisasi Stream...</div>
</div>

<script>
    // Fungsi pintar untuk mengambil seluruh sisa URL tanpa terpotong tanda tanya kedua
    function getRawStreamUrl() {
        const currentUrl = window.location.href;
        const searchKey = "?url=";
        const index = currentUrl.indexOf(searchKey);
        if (index === -1) return null;
        return currentUrl.substring(index + searchKey.length);
    }

    document.addEventListener("DOMContentLoaded", function() {
        const videoElement = document.getElementById('videoElement');
        const statusDiv = document.getElementById('status');
        
        // Menggunakan fungsi bypass potongan URL
        let streamUrl = getRawStreamUrl();

        if (!streamUrl) {
            statusDiv.innerHTML = "<span style='color:red;'>Error: Parameter ?url= tidak ditemukan!</span>";
            return;
        }

        // Decode otomatis jika URL dimasukkan dalam bentuk persen-encoded
        streamUrl = decodeURIComponent(streamUrl);

        if (flvjs.isSupported()) {
            statusDiv.innerText = "Membuka koneksi ke: " + streamUrl;

            const flvPlayer = flvjs.createPlayer({
                type: 'flv',
                url: streamUrl,
                isLive: true,
                hasAudio: true,
                hasVideo: true
            }, {
                enableWorker: true,
                enableStashBuffer: false,
                stashInitialSize: 128
            });

            flvPlayer.attachMediaElement(videoElement);
            flvPlayer.load();

            flvPlayer.play().then(() => {
                statusDiv.innerText = "Streaming Aktif! Aktifkan suara lewat ikon speaker.";
            }).catch(err => {
                statusDiv.innerText = "Klik Play pada video untuk memulai.";
            });

            flvPlayer.on(flvjs.Events.ERROR, function(errorType, errorDetails, errorInfo) {
                console.error(errorType, errorDetails, errorInfo);
                statusDiv.innerHTML = "<span style='color:#ff4d4d;'>Gagal memutar. Cek tab Console untuk detail.</span>";
            });
        } else {
            statusDiv.innerText = "Browser tidak mendukung flv.js";
        }
    });
</script>

</body>
</html>
