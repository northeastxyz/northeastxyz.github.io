<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern HTML5 FLV Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1c1c1c;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            width: 90%;
            max-width: 850px;
            background: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
        }
        .error-msg {
            color: #ff4a4a;
            padding: 20px;
            text-align: center;
            display: none;
            font-weight: bold;
            white-space: pre-wrap;
        }
    </style>

</head>
<body>

    <div class="player-container">
        <video id="videoElement" controls autoplay muted></video>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Paksa bersihkan sisa cetakan error lama jika halaman termuat ulang
        document.addEventListener("DOMContentLoaded", function() {
            const videoElement = document.getElementById('videoElement');
            const errorMsg = document.getElementById('errorMsg');
            const flvUrl = getQueryParam('url');

            if (!flvUrl) {
                errorMsg.innerText = "Error: Parameter URL tidak ditemukan!";
                errorMsg.style.display = "block";
                videoElement.style.display = "none";
                return;
            }

            // LANGSUNG EKSEKUSI PLAYER TANPA SYARAT NYEBELIN
            try {
                if (typeof mpegts === 'undefined') {
                    throw new Error("Library mpegts tidak terdeteksi di window element.");
                }

                const player = mpegts.createPlayer({
                    type: 'flv',
                    url: flvUrl,
                    isLive: true
                }, {
                    enableStashBuffer: false,
                    liveBufferLatencyChasing: true,
                    lazyLoad: false
                });
                
                player.attachMediaElement(videoElement);
                player.load();
                player.play();
                
                player.on(mpegts.Events.ERROR, (type, detail, info) => {
                    errorMsg.innerText = `Stream Error Terdeteksi:\nType: ${type}\nDetail: ${detail}`;
                    errorMsg.style.display = "block";
                });

            } catch (error) {
                // Teks error diubah total agar kamu tahu kalau kodenya SUDAH TERUPDATE di sisi GitHub Pages
                errorMsg.innerText = `[KODE BARU AKTIF] -\nTerjadi kendala inisialisasi: ${error.message}\n\nSolusi: Pastikan Hardware Acceleration aktif di browser Anda.`;
                errorMsg.style.display = "block";
            }
        });
    </script>
</body>
</html>
