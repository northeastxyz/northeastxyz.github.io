<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huya Live Stream Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: sans-serif; }
        .container { width: 100%; max-width: 850px; text-align: center; padding: 10px; }
        video { width: 100%; background-color: #111; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.8); }
        #status { margin-top: 15px; color: #00ffcc; font-size: 14px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <video id="videoElement" controls autoplay muted playsinline></video>
    <div id="status">Mencoba memuat stream...</div>
</div>

<script>
    function getQueryParam(param) {
        return new URLSearchParams(window.location.search).get(param);
    }

    document.addEventListener("DOMContentLoaded", function() {
        const videoElement = document.getElementById('videoElement');
        const statusDiv = document.getElementById('status');
        const streamUrl = getQueryParam('url');

        if (!streamUrl) {
            statusDiv.innerHTML = "<span style='color:red;'>Error: Parameter ?url= kosong!</span>";
            return;
        }

        // Metode 1: Coba putar langsung menggunakan kemampuan native browser (misal di HP/Safari)
        if (videoElement.canPlayType('application/x-mpegURL') || videoElement.canPlayType('vnd.apple.mpegurl')) {
            statusDiv.innerText = "Memutar via Native Browser Player...";
            videoElement.src = streamUrl;
            videoElement.play().catch(e => console.log("Autoplay ditahan"));
        } 
        // Metode 2: Menggunakan hls.js (Untuk Chrome di PC/Laptop)
        else if (Hls.isSupported()) {
            statusDiv.innerText = "Menghubungkan via HLS Engine...";
            
            const hls = new Hls({
                maxBufferLength: 10,
                liveSyncDurationCount: 3,
                forceKeyFrameOnDiscontinuity: true
            });

            hls.loadSource(streamUrl);
            hls.attachMediaElement(videoElement);

            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                statusDiv.innerText = "Streaming Berhasil Dimuat! Silakan klik unmute untuk suara.";
                videoElement.play().catch(e => {
                    statusDiv.innerText = "Klik tombol PLAY untuk memulai streaming.";
                });
            });

            hls.on(Hls.Events.ERROR, function(event, data) {
                console.log("HLS Error:", data);
                // Jika HLS gagal, kita paksa pakai HTML5 video src biasa (Fallback terakhir)
                if (data.fatal) {
                    statusDiv.innerText = "HLS gagal. Mencoba memuat direct source...";
                    videoElement.src = streamUrl;
                }
            });
        } else {
            statusDiv.innerText = "Browser tidak mendukung pemutaran stream ini.";
        }
    });
</script>

</body>
</html>
