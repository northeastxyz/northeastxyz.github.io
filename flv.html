<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>Ultra Clean FLV Player</title>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}

</style>

</head>

<body>

<video
    id="video"
    autoplay
    controls
    preload="auto"
    playsinline
    webkit-playsinline
    x5-video-player-type="h5"
    x5-video-player-fullscreen="true"
    x5-video-orientation="landscape">
</video>

<script>

// =========================
// SPOOF IPHONE
// =========================

Object.defineProperty(
    navigator,
    'userAgent',
    {
        get: () =>
        'Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1'
    }
);

Object.defineProperty(
    navigator,
    'platform',
    {
        get: () => 'iPhone'
    }
);

Object.defineProperty(
    navigator,
    'vendor',
    {
        get: () => 'Apple Computer, Inc.'
    }
);

Object.defineProperty(
    navigator,
    'maxTouchPoints',
    {
        get: () => 5
    }
);

// =========================
// ELEMENT
// =========================

const video =
    document.getElementById(
        'video'
    );

// =========================
// PLAYER STATE
// =========================

let player = null;

let reconnectTimer = null;

// =========================
// GET URL
// =========================

function getRawUrl(){

    const href =
        window.location.href;

    const index =
        href.indexOf('?url=');

    if(index === -1){

        return null;
    }

    return href.substring(
        index + 5
    );
}

const rawUrl =
    getRawUrl();

let currentUrl = null;

if(rawUrl){

    currentUrl =
        decodeURIComponent(
            rawUrl
        );
}

// =========================
// DESTROY PLAYER
// =========================

function destroyPlayer(){

    try{

        if(player){

            player.pause();

            player.unload();

            player.detachMediaElement();

            player.destroy();

            player = null;
        }

    }catch(e){}
}

// =========================
// RECONNECT
// =========================

function reconnect(){

    if(!currentUrl){

        return;
    }

    clearTimeout(
        reconnectTimer
    );

    reconnectTimer =
        setTimeout(
            startPlayer,
            4000
        );
}

// =========================
// START PLAYER
// =========================

function startPlayer(){

    if(!currentUrl){

        return;
    }

    destroyPlayer();

    if(
        typeof mpegts ===
        'undefined'
    ){

        return;
    }

    player =
        mpegts.createPlayer({

            type:'flv',

            isLive:true,

            url:currentUrl

        },{

            enableWorker:true,

            lazyLoad:false,

            liveSync:false,

            liveBufferLatencyChasing:false,

            stashInitialSize:384,

            fixAudioTimestampGap:true,

            autoCleanupSourceBuffer:true,

            autoCleanupMaxBackwardDuration:60,

            autoCleanupMinBackwardDuration:30,

            withCredentials:true,

            headers:{

                'Accept':
                '*/*',

                'Accept-Language':
                'en-US,en;q=0.9',

                'Cache-Control':
                'no-cache',

                'Pragma':
                'no-cache',

                'Origin':
                'https://live.metshop.top',

                'Referer':
                'https://live.metshop.top/',

                'Sec-Fetch-Dest':
                'video',

                'Sec-Fetch-Mode':
                'cors',

                'Sec-Fetch-Site':
                'same-origin'
            }
        });

    player.attachMediaElement(
        video
    );

    player.load();

    // =========================
    // AUTOPLAY FIX
    // =========================

    const tryPlay = () => {

        video.play()
        .catch(() => {});
    };

    tryPlay();

    document.addEventListener(
        'touchstart',
        tryPlay,
        { once:true }
    );

    document.addEventListener(
        'click',
        tryPlay,
        { once:true }
    );

    // =========================
    // PLAYER EVENTS
    // =========================

    player.on(
        mpegts.Events.ERROR,
        reconnect
    );
}

// =========================
// VIDEO EVENTS
// =========================

video.addEventListener(
    'stalled',
    reconnect
);

video.addEventListener(
    'error',
    reconnect
);

video.addEventListener(
    'waiting',
    () => {

        setTimeout(() => {

            video.play()
            .catch(() => {});

        }, 1000);
    }
);

// =========================
// KEEP PLAYING
// =========================

document.addEventListener(
    'visibilitychange',
    () => {

        video.play()
        .catch(() => {});
    }
);

// =========================
// WATCHDOG
// =========================

setInterval(() => {

    if(
        video.readyState <= 1
    ){

        reconnect();
    }

}, 60000);

// =========================
// AUTO START
// =========================

startPlayer();

</script>

</body>
</html>
