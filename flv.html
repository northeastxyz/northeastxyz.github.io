<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huya Full Proxy FLV Player</title>
    
    <script src="./mpegts.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #0b0b0c;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .player-container {
            width: 100%;
            max-width: 480px;
            background: #18181b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #27272a;
            padding: 12px;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }
        .controls-panel {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn-reload {
            background-color: #0d9488;
            color: #ffffff;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reload:hover { background-color: #0f766e; }
        .status-badge {
            font-size: 12px;
            color: #a1a1aa;
            text-align: center;
            word-break: break-all;
            background: #27272a;
            padding: 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="video-wrapper">
            <video id="videoElement" controls crossorigin="anonymous" playsinline></video>
        </div>
        <div class="controls-panel">
            <button class="btn-reload" id="reloadBtn">Reload Stream Proxy</button>
            <div class="status-badge" id="streamUrlBadge">Menghubungkan...</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const videoElement = document.getElementById('videoElement');
            const reloadBtn = document.getElementById('reloadBtn');
            const streamUrlBadge = document.getElementById('streamUrlBadge');
            let player = null;

            // 1. Mengambil parameter query "?url=" atau "?id=" secara fleksibel dari browser
            const urlParams = new URLSearchParams(window.location.search);
            const roomId = urlParams.get('url') || urlParams.get('id') || '30805928';
            
            // Ekstrak room ID saja seandainya yang dilempar adalah link penuh
            const cleanRoomId = roomId.includes('room=') ? roomId.split('room=')[1] : roomId;

            // 2. DIUBAH: Mengarah langsung ke Endpoint API Anvil Anda dengan parameter ?room=
            const finalProxyUrl = `https://teeming-shameless-rail.anvil.app/_/api/get_huya?room=${cleanRoomId}`;

            streamUrlBadge.textContent = `Proxy Anvil: ${finalProxyUrl}`;

            function startLiveStream() {
                if (player !== null) {
                    player.unload();
                    player.detachMediaElement();
                    player.destroy();
                    player = null;
                }

                if (typeof mpegts !== 'undefined' && mpegts.getFeatureList().isSupported) {
                    player = mpegts.createPlayer({
                        type: 'flv',
                        isLive: true,
                        url: finalProxyUrl,
                        cors: true
                    }, {
                        enableWorker: true,
                        lazyLoad: false,
                        liveBufferLatencyChasing: true, // Mengejar delay agar real-time
                        stashInitialSize: 128,          // Menaikkan buffer awal agar stream FLV stabil
                        enableStashBuffer: true
                    });

                    player.attachMediaElement(videoElement);
                    player.load();
                    
                    videoElement.muted = true; // bypass aturan kebijakan autoplay browser
                    player.play().catch(err => {
                        console.log("Autoplay ditahan browser, klik play manual.", err);
                    });
                } else {
                    alert('Browser tidak mendukung flv melalui mpegts.js.');
                }
            }

            setTimeout(startLiveStream, 200);
            reloadBtn.addEventListener('click', startLiveStream);
        });
    </script>

</body>
</html>
