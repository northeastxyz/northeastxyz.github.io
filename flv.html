<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern FLV Player (CORS Supported)</title>
    <!-- Menggunakan CDN mpegts.js untuk decoding FLV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mpegts.js/1.7.3/mpegts.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            width: 80%;
            max-width: 800px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            display: block;
        }
        .controls {
            padding: 10px;
            background: #1e1e1e;
            text-align: center;
        }
        button {
            padding: 8px 16px;
            background-color: #00adb5;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #007a80;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <!-- Atribut crossorigin="anonymous" penting untuk mendukung CORS di sisi client -->
        <video id="videoElement" controls crossorigin="anonymous"></video>
        <div class="controls">
            <button id="reloadBtn">Reload Stream</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // GANTI URL INI dengan url stream/file FLV Anda (bisa berupa http/ws/wss)
            const flvUrl = 'https://example.com/live/stream.flv'; 
            
            const videoElement = document.getElementById('videoElement');

            if (mpegts.getFeatureList().isSupported) {
                const player = mpegts.createPlayer({
                    type: 'flv',
                    isLive: true, // Ubah ke false jika ini file video statis (bukan live stream)
                    url: flvUrl,
                    cors: true // Mengaktifkan mode CORS pada library
                });
                
                player.attachMediaElement(videoElement);
                player.load();
                
                // Autoplay (catatan: browser modern mewajibkan video di-mute jika ingin autoplay)
                videoElement.muted = true;
                player.play().catch(error => {
                    console.log("Autoplay diblokir oleh browser, user harus klik play manual.", error);
                });

                // Tombol reload jika stream terputus
                document.getElementById('reloadBtn').addEventListener('click', () => {
                    player.unload();
                    player.load();
                    player.play();
                });
            } else {
                alert('Browser Anda tidak mendukung pemutaran FLV via mpegts.js');
            }
        });
    </script>

</body>
</html>
