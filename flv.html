<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>

<meta
    name="viewport"
    content="
        width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no,
        viewport-fit=cover
    "
/>

<title>FLV.js Player</title>

<script src="https://cdn.jsdelivr.net/npm/flv.js/dist/flv.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;

    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
}

.player{
    position:relative;

    width:100%;
    height:100%;

    background:black;
}

video{
    width:100%;
    height:100%;

    object-fit:contain;

    background:black;
}

/* =========================
MINIMAL CONTROLS
========================= */

.controls{

    position:absolute;

    left:10px;
    bottom:10px;

    z-index:50;
}

.panel{

    background:rgba(0,0,0,.18);

    backdrop-filter:blur(6px);

    border-radius:999px;

    padding:5px 8px;

    border:1px solid rgba(255,255,255,.03);

    display:flex;

    align-items:center;

    gap:8px;
}

button{

    width:28px;
    height:28px;

    border:none;

    border-radius:50%;

    background:rgba(255,255,255,.08);

    color:white;

    font-size:13px;

    cursor:pointer;
}

#volumeSlider{

    width:70px;

    height:2px;

    accent-color:white;

    cursor:pointer;
}

.stats{

    font-size:9px;

    color:rgba(255,255,255,.65);
}

/* =========================
FULLSCREEN
========================= */

.fullscreen{
    position:absolute;

    right:10px;
    bottom:10px;

    width:40px;
    height:40px;

    border:none;

    border-radius:50%;

    background:rgba(0,0,0,.20);

    backdrop-filter:blur(8px);

    color:white;

    font-size:14px;

    cursor:pointer;

    z-index:60;
}

/* =========================
LOADER
========================= */

.loader{
    position:absolute;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    background:rgba(0,0,0,.35);

    z-index:40;
}

.spinner{
    width:42px;
    height:42px;

    border-radius:50%;

    border:3px solid rgba(255,255,255,.12);

    border-top-color:white;

    animation:spin .8s linear infinite;
}

@keyframes spin{

    to{
        transform:rotate(360deg);
    }
}

.hidden{
    display:none !important;
}

</style>

</head>

<body>

<div class="player">

    <video
        id="video"
        autoplay
        preload="auto"
        controls
        playsinline
        webkit-playsinline>
    </video>

    <!-- LOADER -->

    <div
        class="loader hidden"
        id="loader">

        <div class="spinner"></div>

    </div>

    <!-- FULLSCREEN -->

    <button
        class="fullscreen"
        id="fullscreenBtn">

        ⛶

    </button>

    <!-- CONTROLS -->

    <div class="controls">

        <div class="panel">

            <button id="reloadBtn">

                ↻

            </button>

            <input
                type="range"
                id="volumeSlider"
                min="0"
                max="1"
                step="0.01"
                value="1"
            >

            <div
                class="stats"
                id="stats">

                LIVE
            </div>

        </div>

    </div>

</div>

<script>

// =========================
// ELEMENT
// =========================

const video =
    document.getElementById(
        'video'
    );

const loader =
    document.getElementById(
        'loader'
    );

const statsBox =
    document.getElementById(
        'stats'
    );

const reloadBtn =
    document.getElementById(
        'reloadBtn'
    );

const fullscreenBtn =
    document.getElementById(
        'fullscreenBtn'
    );

const volumeSlider =
    document.getElementById(
        'volumeSlider'
    );

// =========================
// PLAYER
// =========================

let player = null;

// =========================
// GET URL
// =========================

function getRawUrl(){

    const href =
        window.location.href;

    const index =
        href.indexOf('?url=');

    if(index === -1){

        return null;
    }

    return href.substring(
        index + 5
    );
}

const rawUrl =
    getRawUrl();

let currentUrl = null;

if(rawUrl){

    currentUrl =
        decodeURIComponent(
            rawUrl
        );
}

// =========================
// LOADER
// =========================

function showLoader(){

    loader.classList.remove(
        'hidden'
    );
}

function hideLoader(){

    loader.classList.add(
        'hidden'
    );
}

// =========================
// START PLAYER
// =========================

function startPlayer(){

    if(!currentUrl){

        return;
    }

    if(player){

        player.destroy();

        player = null;
    }

    showLoader();

    if(
        flvjs.isSupported()
    ){

        player =
            flvjs.createPlayer({

                type:'flv',

                url:currentUrl,

                isLive:true

            },{

                enableWorker:true,

                lazyLoad:false,

                stashInitialSize:384,

                autoCleanupSourceBuffer:true
            });

        player.attachMediaElement(
            video
        );

        player.load();

        video.volume =
            volumeSlider.value;

        video.play()
        .catch(() => {});

        player.on(
            flvjs.Events.ERROR,
            () => {

                setTimeout(() => {

                    startPlayer();

                }, 3000);
            }
        );

        hideLoader();
    }
}

// =========================
// VIDEO EVENTS
// =========================

video.addEventListener(
    'waiting',
    () => {

        showLoader();

        setTimeout(() => {

            video.play()
            .catch(() => {});

        }, 500);
    }
);

video.addEventListener(
    'playing',
    hideLoader
);

// =========================
// RELOAD
// =========================

reloadBtn.addEventListener(
    'click',
    startPlayer
);

// =========================
// VOLUME
// =========================

volumeSlider.addEventListener(
    'input',
    () => {

        video.volume =
            volumeSlider.value;

        video.muted =
            volumeSlider.value == 0;
    }
);

// =========================
// FULLSCREEN
// =========================

fullscreenBtn.addEventListener(
    'click',
    async () => {

        const wrap =
            document.querySelector(
                '.player'
            );

        if(
            !document.fullscreenElement
        ){

            await wrap
                .requestFullscreen();

            if(
                screen.orientation &&
                screen.orientation.lock
            ){

                screen.orientation
                    .lock(
                        'landscape'
                    )
                    .catch(() => {});
            }

        }else{

            document
                .exitFullscreen();
        }
    }
);

// =========================
// AUTO START
// =========================

startPlayer();

</script>

</body>
</html>
