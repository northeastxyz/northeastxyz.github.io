<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huya Full Proxy FLV Player</title>
    
    <script src="https://unpkg.com/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #0b0b0c;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .player-container {
            width: 100%;
            max-width: 480px; /* Sesuai dengan layout mobile/vertikal DevTools kamu */
            background: #18181b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #27272a;
            padding: 12px;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }
        .controls-panel {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn-reload {
            background-color: #0d9488;
            color: #ffffff;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reload:hover { background-color: #0f766e; }
        .status-badge {
            font-size: 12px;
            color: #a1a1aa;
            text-align: center;
            word-break: break-all;
            background: #27272a;
            padding: 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="video-wrapper">
            <video id="videoElement" controls crossorigin="anonymous" playsinline></video>
        </div>
        <div class="controls-panel">
            <button class="btn-reload" id="reloadBtn">Reload Stream Proxy</button>
            <div class="status-badge" id="streamUrlBadge">Loading URL...</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const videoElement = document.getElementById('videoElement');
            const reloadBtn = document.getElementById('reloadBtn');
            const streamUrlBadge = document.getElementById('streamUrlBadge');
            let player = null;

            // 1. Ambil ID room dari URL (misal: flv.html?id=30805928)
            const urlParams = new URLSearchParams(window.location.search);
            const roomId = urlParams.get('id') || '30805928';

            // 2. Arahkan KE ENDPOINT WORKERS KAMU SENDIRI
            // Karena Workers bertindak sebagai Full Proxy, masukkan base URL workers di sini
            const workersBaseUrl = 'https://flv.northeastxyz.workers.dev/'; 
            const finalProxyUrl = `${workersBaseUrl}?id=${roomId}`;

            // Tampilkan URL di badge untuk memastikan tidak ada salah ketik parameter
            streamUrlBadge.textContent = `Proxying: ${finalProxyUrl}`;

            function startLiveStream() {
                if (player !== null) {
                    player.unload();
                    player.detachMediaElement();
                    player.destroy();
                    player = null;
                }

                if (mpegts.getFeatureList().isSupported) {
                    // Konfigurasi khusus untuk performa Full Proxy (Low Latency)
                    player = mpegts.createPlayer({
                        type: 'flv',
                        isLive: true,
                        url: finalProxyUrl,
                        cors: true // Selaras dengan header Access-Control-Allow-Origin di Workers
                    }, {
                        enableWorker: true,        // Memisahkan proses decoding ke thread tersendiri agar tidak lag
                        lazyLoad: false,           // Matikan lazy load agar data terus ditarik secara realtime
                        liveBufferLatencyChasing: true, // Otomatis mengejar sisa buffer agar tidak delay/tertinggal jauh
                        stashInitialSize: 128      // Ukuran buffer awal dalam KB (semakin kecil, semakin instan menyala)
                    });

                    player.attachMediaElement(videoElement);
                    player.load();
                    
                    // Kebijakan browser: Harus mute jika ingin memaksa autoplay
                    videoElement.muted = true;
                    
                    player.play().catch(err => {
                        console.log("Autoplay dicegah browser, silakan klik play manual.", err);
                    });
                } else {
                    alert('Browser tidak mendukung mpegts.js');
                }
            }

            // Jalankan player saat halaman dimuat
            startLiveStream();

            // Handler tombol reload
            reloadBtn.addEventListener('click', startLiveStream);
        });
    </script>

</body>
</html>
