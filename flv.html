<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern HTML5 FLV Player</title>
    <!-- Opsi 1: Menggunakan CDN unpkg yang valid dan stabil -->
    <script src="https://unpkg.com/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1c1c1c;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .player-container {
            width: 90%;
            max-width: 850px;
            background: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
        }
        .error-msg {
            color: #ff4a4a;
            padding: 20px;
            text-align: center;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <!-- controls: tombol navigasi, autoplay: putar otomatis, muted: disenyapkan agar bypass kebijakan autoplay browser -->
        <video id="videoElement" controls autoplay muted></video>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script>
        // Fungsi untuk mengambil parameter 'url' dari query string
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        document.addEventListener("DOMContentLoaded", function() {
            const videoElement = document.getElementById('videoElement');
            const errorMsg = document.getElementById('errorMsg');
            
            // Mengambil link stream dari ?url=
            const flvUrl = getQueryParam('url');

            if (!flvUrl) {
                errorMsg.innerText = "Error: Parameter URL tidak ditemukan!\nContoh format: flv.html?url=https://alamat-stream.com/live.flv";
                errorMsg.style.display = "block";
                videoElement.style.display = "none";
                return;
            }

            // Memastikan browser mendukung MSE (Media Source Extensions)
            if (mpegts.getFeatureList().mseSourceBufferSupported) {
                
                // Konfigurasi player mpegts
                const player = mpegts.createPlayer({
                    type: 'flv',
                    url: flvUrl,
                    isLive: true // Diubah ke true karena url pada image_bc1f3e.png berupa Live Streaming
                }, {
                    enableStashBuffer: false, // Meminimalkan delay/latensi untuk live stream
                    liveBufferLatencyChasing: true
                });
                
                player.attachMediaElement(videoElement);
                player.load();
                
                // Menangani error pemutaran video secara internal
                player.on(mpegts.Events.ERROR, (type, detail, info) => {
                    console.error('Player Error:', type, detail, info);
                    errorMsg.innerText = "Gagal memuat video. Pastikan link aktif dan mendukung CORS.";
                    errorMsg.style.display = "block";
                });

            } else {
                errorMsg.innerText = "Browser Anda tidak mendukung pemutaran FLV berbasis MSE.";
                errorMsg.style.display = "block";
            }
        });
    </script>
</body>
</html>
