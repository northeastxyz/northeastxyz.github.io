<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menuju Link Tujuan...</title>
    
    <!-- Skrip Vignette Monetag -->
    <script>(function(s){s.dataset.zone='11141931',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 40px 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .btn { display: none; background: #28a745; color: white; padding: 15px 30px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 10px rgba(40,167,69,0.3); transition: 0.3s; }
        .btn:hover { background: #218838; transform: translateY(-3px); }
        .timer { font-size: 20px; font-weight: bold; color: #d9534f; margin: 15px 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #d9534f; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Pembungkus agar posisi banner 300x250 dari AdSterra berada tepat di tengah */
        .adsterra-container { margin: 25px auto 0 auto; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <h3>Menyiapkan Tautan...</h3>
    <p>Mohon tunggu sebentar untuk melanjutkan ke tujuan Anda.</p>
    
    <div id="loading-zone">
        <div class="loader"></div>
        <div class="timer" id="countdown">Menunggu: 5 detik</div>
    </div>
    
    <a href="#" id="redirect-btn" class="btn">KLIK DI SINI UNTUK MELANJUTKAN</a>
</div>

<!-- Tempat Banner Statis 300x250 AdSterra -->
<div class="adsterra-container">
    <script>
        atOptions = {
            'key' : 'edbd8723bd12e9ca889bef0ef9d4d90d',
            'format' : 'iframe',
            'height' : 250,
            'width' : 300,
            'params' : {}
        };
    </script>
    <script src="https://www.highperformanceformat.com/edbd8723bd12e9ca889bef0ef9d4d90d/invoke.js"></script>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetUrl = urlParams.get('url');

    if (!targetUrl) {
        document.getElementById('loading-zone').innerHTML = "<p style='color:red;'>Error: Link tidak ditemukan.</p>";
    } else {
        let timeLeft = 5;
        const timerElement = document.getElementById('countdown');
        const btnElement = document.getElementById('redirect-btn');
        const loadingZone = document.getElementById('loading-zone');

        const downloadTimer = setInterval(function(){
            timeLeft--;
            timerElement.innerText = "Menunggu: " + timeLeft + " detik";
            
            if(timeLeft <= 0){
                clearInterval(downloadTimer);
                loadingZone.style.display = "none";
                btnElement.href = decodeURIComponent(targetUrl);
                btnElement.style.display = "inline-block";
            }
        }, 1000);
    }
</script>

</body>
</html>
