<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menuju Link Tujuan...</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f4f4f9; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { display: none; background: #28a745; color: white; padding: 14px 28px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px; font-size: 18px; box-shadow: 0 4px 15px rgba(40,167,69,0.3); transition: 0.2s; }
        .btn:hover { background: #218838; transform: translateY(-2px); }
        .timer { font-size: 22px; font-weight: bold; color: #dc3545; margin: 20px 0; }
        .ads-space { margin: 20px 0; min-height: 100px; background: #f8f9fa; border: 2px dashed #ddd; line-height: 100px; color: #999; border-radius: 6px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #dc3545; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <!-- ========================================================= -->
    <!-- SCRIPT IKLAN 1: VIGNETTE BANNER / IN-PAGE PUSH DARI MONETAG -->
    <!-- Tempelkan Script Tag (In-Page Push / Vignette) dari Monetag di bawah ini -->
    
    <!-- ========================================================= -->

</head>
<body>

<div class="container">
    <h2>Safelink Link Keamanan</h2>
    <p>Silakan tunggu sebentar, halaman tujuan Anda sedang disiapkan...</p>
    
    <!-- TEMPAT IKLAN BANNER ATAS -->
    <div class="ads-space">
        <!-- Tempel kode iklan Banner Monetag kamu di sini jika ada -->
        [Iklan Banner Atas]
    </div>

    <!-- Loading & Timer Countdown -->
    <div id="loading-zone">
        <div class="loader"></div>
        <div class="timer" id="countdown">Menghitung mundur: 5 detik</div>
    </div>
    
    <!-- Tombol Tujuan (Akan muncul otomatis setelah 5 detik) -->
    <a href="#" id="redirect-btn" class="btn">KLIK DI SINI UNTUK MELANJUTKAN</a>

    <!-- TEMPAT IKLAN BANNER BAWAH -->
    <div class="ads-space">
        <!-- Tempel kode iklan Banner Monetag kamu di sini jika ada -->
        [Iklan Banner Bawah]
    </div>
</div>

<script>
    // Script untuk mengambil parameter ?url=
    const urlParams = new URLSearchParams(window.location.search);
    const targetUrl = urlParams.get('url');

    if (!targetUrl) {
        document.getElementById('loading-zone').innerHTML = "<span style='color:red; font-weight:bold;'>Error: Link tujuan tidak valid atau kosong!</span>";
    } else {
        let timeLeft = 5; // Durasi hitung mundur (5 detik)
        const timerElement = document.getElementById('countdown');
        const btnElement = document.getElementById('redirect-btn');
        const loadingZone = document.getElementById('loading-zone');

        const downloadTimer = setInterval(function(){
            timeLeft--;
            timerElement.innerText = "Menghitung mundur: " + timeLeft + " detik";
            
            if(timeLeft <= 0){
                clearInterval(downloadTimer);
                loadingZone.style.display = "none"; // Sembunyikan timer & loading
                btnElement.href = decodeURIComponent(targetUrl); // Dekode URL tujuan
                btnElement.style.display = "inline-block"; // Munculkan tombol hijau
            }
        }, 1000);
    }
</script>

</body>
</html>
