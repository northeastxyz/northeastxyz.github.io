<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clappr MPD Player with Quality Selector</title>
    <!-- Load Clappr & Dash Shaka Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dash-shaka-playback@latest/dist/dash-shaka-playback.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/clappr-quality-selector-latest@latest/dist/clappr-quality-selector.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="player"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const mpdUrl = params.get('mpd');
        const keyPair = params.get('key');

        let drmConfig = {};
        if (keyPair && keyPair.includes(':')) {
            const [kid, key] = keyPair.split(':');
            drmConfig = {
                clearKeys: {
                    [kid]: key
                }
            };
        }

        var player = new Clappr.Player({
            source: mpdUrl,
            parentId: "#player",
            plugins: [DashShakaPlayback, QualitySelector],
            shakaConfiguration: {
                drm: drmConfig
            },
            width: '100%',
            height: '100%',
            autoPlay: true,
            mimeType: 'application/dash+xml'
        });
    </script>
</body>
</html>
