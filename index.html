<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JW Player MPD ClearKey</title>
    <!-- Load JW Player Library (Ganti dengan link library milikmu jika punya sendiri) -->
    <script src="https://ssl.p.jwpcdn.com/player/v/8.21.0/jwplayer.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #player { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <div id="player"></div>

    <script>
        // Ambil parameter dari URL
        const params = new URLSearchParams(window.location.search);
        const mpdUrl = params.get('mpd');
        const keyPair = params.get('key');

        let drmConfig = {};

        // Konfigurasi ClearKey untuk JW Player
        if (keyPair && keyPair.includes(':')) {
            const [kid, key] = keyPair.split(':');
            drmConfig = {
                clearkey: {
                    keyId: kid,
                    key: key
                }
            };
        }

        const playerInstance = jwplayer("player").setup({
            file: mpdUrl,
            type: "dash",
            width: "100%",
            height: "100%",
            autostart: true,
            mute: false,
            drm: drmConfig
        });

        playerInstance.on('error', function(e) {
            console.error("JW Player Error:", e);
        });
    </script>
</body>
</html>
