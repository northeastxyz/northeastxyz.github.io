<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DASH ClearKey Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dash-shaka-playback@latest/dist/dash-shaka-playback.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/clappr/clappr-level-selector-plugin@latest/dist/level-selector.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; background: #000; overflow: hidden; }
    #player { width: 100%; height: 100%; position: fixed; top: 0; left: 0; }
    
    /* Memastikan kontrol tidak tertutup navigasi HP */
    .clappr-controls { bottom: 20px !important; }
  </style>
</head>
<body>

  <div id="player"></div>

  <script>
    'use strict';

    function initPlayer() {
      const params = new URLSearchParams(window.location.search);
      const mpdUrl = params.get('mpd');
      const keyPair = params.get('key');
      
      let drmConfig = {};

      if (keyPair && keyPair.includes(':')) {
        const [kid, key] = keyPair.split(':');
        drmConfig = {
          clearKeys: { [kid]: key }
        };
      }

      if (mpdUrl) {
        const player = new Clappr.Player({
          source: mpdUrl,
          parentId: '#player',
          plugins: [DashShakaPlayback, LevelSelector],
          shakaConfiguration: {
            drm: drmConfig,
            streaming: { jumpLargeGaps: true }
          },
          shakaOnBeforeLoad: function(shakaPlayer) {
            // Tambahan jika perlu tuning shaka langsung
          },
          width: '100%',
          height: '100%',
          autoPlay: true,
          mediacontrol: { seekbar: '#e94560', buttons: '#eee' },
        });
      }
    }

    window.onload = initPlayer;
  </script>
</body>
</html>
