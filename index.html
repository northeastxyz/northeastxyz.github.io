<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MPD Player - Mobile Optimized</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/controls.css">
    <style>
        /* Menghilangkan margin dan memastikan body tidak bisa scroll */
        html, body { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
        }

        /* Container dibuat flex agar video berada di tengah dan pas di layar */
        .video-container { 
            width: 100%; 
            height: 100vh; /* Memenuhi layar tapi tetap dalam batas viewport */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Memastikan video tidak terpotong */
        }

        /* Memperkecil UI Shaka agar tidak menumpuk di layar HP */
        .shaka-controls-container {
            font-size: 12px !important;
        }
        
        .shaka-overflow-menu, .shaka-settings-menu {
            background-color: rgba(30, 30, 30, 0.9) !important;
            max-height: 80vh; /* Agar menu tidak melebihi layar */
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="video-container" data-shaka-player-container>
        <video data-shaka-player id="video" autoplay playsinline></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/shaka-player.ui.js"></script>

    <script>
        async function init() {
            const video = document.getElementById('video');
            const ui = video['ui'];
            const controls = ui.getControls();
            const player = controls.getPlayer();

            // Konfigurasi agar tombol resolusi (quality) muncul langsung di bar utama
            ui.configure({
                'controlPanelElements': ['play_pause', 'spacer', 'quality', 'mute', 'fullscreen', 'overflow_menu'],
                'overflowMenuButtons' : ['quality', 'playback_rate'],
                'addQualityControls': true
            });

            player.configure({
                abr: { enabled: true },
                streaming: { 
                    lowLatencyMode: true,
                    jumpLargeGaps: true 
                }
            });

            const params = new URLSearchParams(window.location.search);
            const mpdUrl = params.get('mpd');
            const keyPair = params.get('key');

            if (keyPair && keyPair.includes(':')) {
                const [kid, key] = keyPair.split(':');
                player.configure({
                    drm: { clearKeys: { [kid]: key } }
                });
            }

            if (mpdUrl) {
                try {
                    await player.load(mpdUrl);
                } catch (e) {
                    console.error('Error load:', e);
                }
            }
        }

        document.addEventListener('shaka-ui-loaded', init);
    </script>
</body>
</html>
