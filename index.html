<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DASH Player - EdgeOne Style</title>
    <link href="https://imgcache.qq.com/open/qcloud/video/tcplayer/tcplayer.min.css" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #player-container { width: 100%; height: 100%; }
        /* Memperbaiki z-index menu resolusi di mobile */
        .tcp-skin .tcp-setting-usage { z-index: 999; }
    </style>
</head>
<body>

    <div id="player-container">
        <video id="player-video" preload="auto" playsinline webkit-playsinline></video>
    </div>

    <script src="https://imgcache.qq.com/open/qcloud/video/tcplayer/libs/hls.min.0.13.2m.js"></script>
    <script src="https://imgcache.qq.com/open/qcloud/video/tcplayer/libs/dash.all.min.3.1.3.js"></script>
    <script src="https://imgcache.qq.com/open/qcloud/video/tcplayer/tcplayer.v4.8.0.min.js"></script>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const mpdUrl = params.get('mpd');
            const keyPair = params.get('key');

            if (!mpdUrl) {
                console.error("Link MPD tidak ditemukan.");
                return;
            }

            // Inisialisasi TCPlayer
            const player = TCPlayer('player-video', {
                autoplay: true,
                controls: true,
                width: '100%',
                height: '100%',
                sources: [{
                    src: mpdUrl,
                    type: 'application/dash+xml'
                }],
                // Fitur Resolusi dan Kontrol
                playbackRates: [0.5, 1, 1.25, 1.5, 2],
                plugins: {
                    ContinuePlay: false, // Mematikan fitur lanjut nonton
                }
            });

            // Menangani DRM ClearKey jika ada
            if (keyPair && keyPair.includes(':')) {
                const [kid, key] = keyPair.split(':');
                // Konfigurasi DRM untuk DASH di TCPlayer
                player.dashPlayer.setProtectionData({
                    "org.w3.clearkey": {
                        "clearkeys": {
                            [kid]: key
                        }
                    }
                });
            }

            // Force Refresh Resolusi setelah load
            player.on('ready', function() {
                console.log('Player Ready');
                // TCPlayer otomatis mendeteksi track kualitas dari MPD
            });

        })();
    </script>
</body>
</html>
