<script>
    // SCRIPT REDIRECT LINK & TIMER
    const urlParams = new URLSearchParams(window.location.search);
    const targetUrl = urlParams.get('url');

    if (!targetUrl) {
        document.getElementById('loading-zone').innerHTML = "<p style='color:red; font-weight:bold;'>Error: Tautan tujuan tidak ditemukan.</p>";
    } else {
        let timeLeft = 3; 
        const timerElement = document.getElementById('countdown');
        const btnElement = document.getElementById('redirect-btn');
        const loadingZone = document.getElementById('loading-zone');

        const downloadTimer = setInterval(function(){
            timeLeft--;
            timerElement.innerText = "Menunggu: " + timeLeft + " detik";
            
            if(timeLeft <= 0){
                clearInterval(downloadTimer);
                loadingZone.style.display = "none";
                btnElement.href = decodeURIComponent(targetUrl);
                btnElement.style.display = "inline-block";
            }
        }, 1000);
    }
</script>
