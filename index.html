<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed MPD Player</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/controls.css">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/shaka-player.ui.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
        /* Memaksa menu agar muncul di Android */
        .shaka-overflow-menu button { font-size: 14px !important; padding: 10px !important; }
    </style>
</head>
<body>

    <div class="video-container" data-shaka-player-container>
        <video data-shaka-player id="video" autoplay playsinline></video>
    </div>

    <script>
        async function init() {
            const video = document.getElementById('video');
            const ui = video['ui'];
            const controls = ui.getControls();
            const player = controls.getPlayer();

            // Konfigurasi UI untuk Resolusi
            ui.configure({
                'controlPanelElements': ['play_pause', 'time_and_duration', 'spacer', 'quality', 'mute', 'fullscreen', 'overflow_menu'],
                'overflowMenuButtons' : ['quality', 'playback_rate'],
                'addQualityControls': true
            });

            // Konfigurasi Player agar lebih "tahan banting"
            player.configure({
                abr: { enabled: true },
                streaming: {
                    lowLatencyMode: true,
                    jumpLargeGaps: true
                }
            });

            const params = new URLSearchParams(window.location.search);
            const mpdUrl = params.get('mpd');
            const keyPair = params.get('key');

            if (keyPair && keyPair.includes(':')) {
                const [kid, key] = keyPair.split(':');
                player.configure({
                    drm: { clearKeys: { [kid]: key } }
                });
            }

            if (mpdUrl) {
                try {
                    // Jika link HTTP digunakan di HTTPS (GitHub), ini akan tetap sulit 
                    // kecuali user sudah "Allow Insecure Content" di browser.
                    await player.load(mpdUrl);
                } catch (e) {
                    console.error('Gagal load:', e);
                }
            }
        }

        document.addEventListener('shaka-ui-loaded', init);
    </script>
</body>
</html>
