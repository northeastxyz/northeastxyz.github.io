<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaltura DRM Player</title>
    <script src="https://cdn.jsdelivr.net/npm/kaltura-player-js@latest/dist/kaltura-player.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #player-placeholder { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="player-placeholder"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const mpdUrl = params.get('mpd');
            const keyPair = params.get('key');

            if (!mpdUrl) return;

            let drmConfig = [];
            if (keyPair && keyPair.includes(':')) {
                const [kid, key] = keyPair.split(':');
                // Konfigurasi ClearKey untuk Kaltura
                drmConfig = [{
                    licenseUrl: "", 
                    scheme: "clearkey",
                    keyId: kid,
                    key: key
                }];
            }

            // Inisialisasi Kaltura Player
            try {
                const config = {
                    targetId: "player-placeholder",
                    provider: { partnerId: 0 }, // Standalone mode
                    playback: {
                        autoplay: true,
                        playsinline: true,
                        options: {
                            html5: {
                                dash: {
                                    drm: {
                                        "org.w3.clearkey": {
                                            clearkeys: { [drmConfig[0].keyId]: drmConfig[0].key }
                                        }
                                    }
                                }
                            }
                        }
                    },
                    sources: {
                        dash: [{
                            url: mpdUrl,
                            id: "dash-source"
                        }]
                    }
                };

                const player = KalturaPlayer.setup(config);
                player.loadMedia({ sources: config.sources });

            } catch (e) {
                console.error("Kaltura Error:", e);
            }
        });
    </script>
</body>
</html>
