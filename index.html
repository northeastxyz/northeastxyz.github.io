<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Player</title>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <style>
        /* Membuat tampilan benar-benar bersih dan hitam pekat */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video { 
            width: 100%; 
            height: 100%; 
            background: #000;
        }
    </style>
</head>
<body>

    <video id="videoPlayer" controls autoplay playsinline></video>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const videoElement = document.getElementById('videoPlayer');
            
            // Mengambil data dari URL parameter
            // Format: ?mpd=URL_MPD&key=KID:KEY
            const params = new URLSearchParams(window.location.search);
            const mpdUrl = params.get('mpd');
            const keyPair = params.get('key');

            if (!mpdUrl) {
                console.error("Link MPD tidak ditemukan di URL.");
                return;
            }

            const player = dashjs.MediaPlayer().create();

            // Setup DRM jika parameter key ada
            if (keyPair && keyPair.includes(':')) {
                const [kid, key] = keyPair.split(':');
                player.setProtectionData({
                    "org.w3.clearkey": {
                        "clearkeys": { [kid.trim()]: key.trim() }
                    }
                });
            }

            // Inisialisasi dan putar
            player.initialize(videoElement, mpdUrl, true);

            // Pengaturan tambahan agar streaming lebih lancar
            player.updateSettings({
                'streaming': {
                    'lowLatencyEnabled': true,
                    'abr': { 'useDefaultABRRules': true }
                }
            });
        });
    </script>
</body>
</html>
